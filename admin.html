<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pannello Sposi | Michela & Maurizio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { wedding: { light: '#FAFAFA', dark: '#1A1A1A', gold: '#D4AF37', danger: '#ef4444' } },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex flex-col font-sans bg-[#FAFAFA] text-[#1A1A1A]">

    <header class="bg-[#1A1A1A] text-white pt-10 pb-6 px-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto">
            <button onclick="window.location.href='index.html'" class="text-white/80 hover:text-white flex items-center gap-2 transition-colors mb-6 bg-white/10 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                Torna alla Live Gallery
            </button>
            <p class="text-[10px] text-[#D4AF37] uppercase tracking-widest font-semibold mb-1">Accesso VIP Sposi</p>
            <h1 class="font-serif text-3xl">Pannello di Controllo</h1>
        </div>
    </header>

    <section class="max-w-4xl mx-auto w-full px-6 py-8">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm flex flex-col items-center justify-center">
                <h3 class="text-3xl font-serif text-[#1A1A1A]" id="stat-photos">0</h3>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Foto Ricevute</p>
            </div>
            <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm flex flex-col items-center justify-center">
                <h3 class="text-3xl font-serif text-[#1A1A1A]" id="stat-audio">0</h3>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Vocali Ricevuti</p>
            </div>
        </div>
    </section>

    <main class="flex-grow max-w-4xl mx-auto w-full px-6 pb-24">
        <div class="flex items-center justify-between mb-6 border-b border-gray-200 pb-2">
            <h2 class="font-serif text-xl">Moderazione Live</h2>
        </div>
        <div id="admin-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAKSDOdxKmz_NmqhuijaNGZXdjLBXnHCU1E",
          authDomain: "fir-config-6e53e.firebaseapp.com",
          projectId: "fir-config-6e53e",
          storageBucket: "fir-config-6e53e.firebasestorage.app",
          messagingSenderId: "790952608645",
          appId: "1:790952608645:web:a2f443e7be975ff0dc7aec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const galleryRef = collection(db, "live_gallery");

        lucide.createIcons();

        window.deleteContent = async (docId) => {
            if (confirm("Eliminare definitivamente questo ricordo?")) {
                await deleteDoc(doc(db, "live_gallery", docId));
            }
        };

        onSnapshot(query(galleryRef, orderBy("timestamp", "desc")), (snapshot) => {
            const adminGrid = document.getElementById("admin-grid");
            let photoCount = 0; let audioCount = 0;
            adminGrid.innerHTML = "";

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const docId = docSnap.id; 
                
                if (data.type === 'audio') {
                    audioCount++;
                    adminGrid.insertAdjacentHTML('beforeend', `
                        <div class="bg-white border border-gray-100 rounded-xl p-4 flex items-center gap-4 relative overflow-hidden shadow-sm">
                            <div class="bg-gray-50 rounded-full p-4 text-[#D4AF37]"><i data-lucide="mic" class="w-6 h-6"></i></div>
                            <div class="flex-grow">
                                <p class="text-xs font-semibold mb-1">Vocale di ${data.guestName}</p>
                                <audio controls src="${data.url}" class="w-full h-8 scale-[0.85] origin-left"></audio>
                            </div>
                            <button onclick="deleteContent('${docId}')" class="bg-red-50 text-red-500 p-3 rounded-lg"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    `);
                } else {
                    photoCount++;
                    adminGrid.insertAdjacentHTML('beforeend', `
                        <div class="bg-white border border-gray-100 rounded-xl p-3 flex items-center gap-4 relative shadow-sm">
                            <div class="w-20 h-20 rounded-lg overflow-hidden shrink-0"><img src="${data.url.replace('/upload/', '/upload/w_200/')}" class="w-full h-full object-cover"></div>
                            <div class="flex-grow flex flex-col justify-center"><p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Foto di ${data.guestName}</p></div>
                            <button onclick="deleteContent('${docId}')" class="bg-red-50 text-red-500 p-3 rounded-lg"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    `);
                }
            });

            document.getElementById('stat-photos').innerText = photoCount;
            document.getElementById('stat-audio').innerText = audioCount;
            lucide.createIcons();
        });
    </script>
</body>
</html>
