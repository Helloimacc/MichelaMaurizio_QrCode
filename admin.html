<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pannello Sposi | Michela & Maurizio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { wedding: { light: '#FAFAFA', dark: '#1A1A1A', gold: '#D4AF37', danger: '#ef4444' } },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>

    <style>
        body { background-color: #FAFAFA; color: #1A1A1A; -webkit-tap-highlight-color: transparent; }
        .admin-card { transition: all 0.2s ease-in-out; }
        .admin-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <header class="bg-wedding-dark text-white pt-12 pb-6 px-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <p class="text-[10px] text-wedding-gold uppercase tracking-widest font-semibold mb-1">Accesso VIP</p>
                <h1 class="font-serif text-2xl md:text-3xl">Pannello di Controllo</h1>
            </div>
            <button onclick="window.location.href='index.html'" class="text-white/70 hover:text-white flex flex-col items-center gap-1 transition-colors">
                <i data-lucide="log-out" class="w-5 h-5"></i>
                <span class="text-[8px] uppercase tracking-widest">Esci</span>
            </button>
        </div>
    </header>

    <section class="max-w-4xl mx-auto w-full px-6 py-8">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm flex flex-col items-center justify-center">
                <i data-lucide="image" class="w-6 h-6 text-wedding-gold mb-2"></i>
                <h3 class="text-3xl font-serif text-wedding-dark" id="stat-photos">0</h3>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Foto Ricevute</p>
            </div>
            <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm flex flex-col items-center justify-center">
                <i data-lucide="mic" class="w-6 h-6 text-wedding-gold mb-2"></i>
                <h3 class="text-3xl font-serif text-wedding-dark" id="stat-audio">0</h3>
                <p class="text-[10px] text-gray-400 uppercase tracking-widest">Vocali Ricevuti</p>
            </div>
        </div>
    </section>

    <main class="flex-grow max-w-4xl mx-auto w-full px-6 pb-24">
        <div class="flex items-center justify-between mb-6 border-b border-gray-200 pb-2">
            <h2 class="font-serif text-xl text-wedding-dark">Moderazione Live</h2>
            <span class="bg-green-100 text-green-700 text-[9px] uppercase tracking-widest px-2 py-1 rounded-full font-bold flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Sistema Attivo
            </span>
        </div>

        <div id="admin-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <p id="empty-state" class="col-span-full text-center text-gray-400 italic font-serif py-10">Nessun contenuto da moderare al momento.</p>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAKSDOdxKmz_NmqhuijaNGZXdjLBXnHCU1E",
          authDomain: "fir-config-6e53e.firebaseapp.com",
          projectId: "fir-config-6e53e",
          storageBucket: "fir-config-6e53e.firebasestorage.app",
          messagingSenderId: "790952608645",
          appId: "1:790952608645:web:a2f443e7be975ff0dc7aec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const galleryRef = collection(db, "live_gallery");

        lucide.createIcons();

        window.deleteContent = async (docId) => {
            const confirmDelete = confirm("Sei sicuro di voler rimuovere questo contenuto dal Live Feed?");
            if (confirmDelete) {
                try {
                    await deleteDoc(doc(db, "live_gallery", docId));
                } catch (error) {
                    console.error("Errore durante l'eliminazione:", error);
                    alert("Si è verificato un errore.");
                }
            }
        };

        const q = query(galleryRef, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const adminGrid = document.getElementById("admin-grid");
            const emptyState = document.getElementById("empty-state");
            
            let photoCount = 0; let audioCount = 0;

            if (!snapshot.empty && emptyState) emptyState.remove();
            adminGrid.innerHTML = "";

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const docId = docSnap.id; 
                const dateStr = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Oggi';

                if (data.type === 'audio') {
                    audioCount++;
                    const audioHTML = `
                        <div class="admin-card bg-white border border-gray-100 rounded-xl p-4 flex items-center gap-4 relative overflow-hidden">
                            <div class="bg-wedding-accent rounded-full p-4 text-wedding-gold"><i data-lucide="mic" class="w-6 h-6"></i></div>
                            <div class="flex-grow">
                                <p class="text-xs font-semibold text-wedding-dark mb-1">Vocale delle ${dateStr}</p>
                                <audio controls src="${data.url}" class="w-full h-8 scale-[0.85] origin-left"></audio>
                            </div>
                            <button onclick="deleteContent('${docId}')" class="bg-red-50 hover:bg-red-100 text-wedding-danger p-3 rounded-lg transition-colors shadow-sm ml-2">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    `;
                    adminGrid.insertAdjacentHTML('beforeend', audioHTML);
                } else {
                    photoCount++;
                    const optimizedUrl = data.url.replace("/upload/", "/upload/w_200,h_200,c_fill,g_auto,q_auto,f_auto/");
                    const commentText = data.comment ? `<p class="text-xs text-gray-500 italic mt-2">"${data.comment}"</p>` : '';

                    const imgHTML = `
                        <div class="admin-card bg-white border border-gray-100 rounded-xl p-3 flex items-center gap-4 relative">
                            <div class="w-20 h-20 rounded-lg overflow-hidden shrink-0 bg-gray-100">
                                <img src="${optimizedUrl}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex-grow flex flex-col justify-center">
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Foto • ${dateStr}</p>
                                ${commentText}
                            </div>
                            <button onclick="deleteContent('${docId}')" class="bg-red-50 hover:bg-red-100 text-wedding-danger p-3 rounded-lg transition-colors shadow-sm">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                    `;
                    adminGrid.insertAdjacentHTML('beforeend', imgHTML);
                }
            });

            document.getElementById('stat-photos').innerText = photoCount;
            document.getElementById('stat-audio').innerText = audioCount;

            if (photoCount === 0 && audioCount === 0) {
                adminGrid.innerHTML = '<p id="empty-state" class="col-span-full text-center text-gray-400 italic font-serif py-10">Nessun contenuto da moderare al momento.</p>';
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
