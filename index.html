<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Michela & Maurizio | Wedding App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { wedding: { light: '#FAFAFA', dark: '#1A1A1A', gold: '#D4AF37', accent: '#F9F6F0' } },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>

    <style>
        body { background-color: #FAFAFA; color: #1A1A1A; -webkit-tap-highlight-color: transparent; }
        
        .fade-out-up { animation: fadeOutUp 0.8s cubic-bezier(0.8, 0, 0.2, 1) forwards; }
        @keyframes fadeOutUp { to { opacity: 0; transform: translateY(-50px); pointer-events: none; display: none; } }
        
        .slide-up-modal { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-up-modal.open { transform: translateY(0); }

        .photo-reveal { animation: reveal 0.5s ease-out forwards; opacity: 0; }
        @keyframes reveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .custom-checkbox:checked { background-color: #D4AF37; border-color: #D4AF37; }
        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }

        .no-save { -webkit-user-drag: none; -webkit-touch-callout: none; user-select: none; pointer-events: none; }
        .touch-manipulation { touch-action: manipulation; }
    </style>
</head>
<body class="relative min-h-[100dvh] overflow-x-hidden flex flex-col font-sans">

    <div id="privacy-screen" class="fixed inset-0 z-[100] bg-wedding-light flex flex-col items-center justify-center p-8">
        <div class="max-w-sm w-full text-center">
            <h1 class="font-serif text-4xl text-wedding-dark mb-2">Michela <span class="text-wedding-gold italic">&</span> Maurizio</h1>
            <p class="text-xs uppercase tracking-widest text-gray-400 mb-10">09 Maggio 2026</p>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8 text-left">
                <h3 class="font-serif text-lg mb-4 text-center">Firma il Registro 🖋️</h3>
                
                <input type="text" id="guest-name" placeholder="Il tuo nome (opzionale)" class="w-full bg-gray-50 border border-gray-200 text-base font-bold text-wedding-dark p-4 rounded-xl mb-4 focus:outline-none focus:border-wedding-gold transition-colors text-center placeholder:font-normal placeholder:text-gray-400">
                
                <div class="w-full h-px bg-gray-100 my-4"></div>

                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" id="privacy-check" onchange="toggleEnterBtn()" class="custom-checkbox mt-1 w-5 h-5 rounded border-gray-300 text-wedding-gold focus:ring-wedding-gold transition-colors">
                    <span class="text-xs text-gray-600 leading-relaxed font-medium">Giuro solennemente di caricare solo prove compromettenti e far divertire gli sposi! (Accetto)</span>
                </label>
            </div>
            
            <button id="btn-enter" disabled onclick="enterApp()" class="w-full bg-wedding-dark text-white font-medium uppercase tracking-widest text-xs py-4 rounded-xl opacity-50 cursor-not-allowed transition-all">
                Entra nell'App
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden flex-col items-center w-full flex-grow pb-24 relative">
        
        <button onclick="handleSecretAdmin(event)" class="fixed top-6 right-4 z-50 text-wedding-dark/30 hover:text-wedding-dark p-2 transition-colors touch-manipulation">
            <i data-lucide="user" class="w-6 h-6" id="lock-icon"></i>
        </button>

        <div class="sticky top-0 z-40 w-full bg-[#FAFAFA]/90 backdrop-blur-md pt-6 pb-4 border-b border-gray-100 mb-4 px-4 shadow-sm">
            <header class="text-center max-w-2xl mx-auto flex flex-col items-center">
                <h1 class="font-serif text-[28px] text-wedding-dark italic leading-none mb-1">Michela <span class="text-wedding-gold">&</span> Maurizio</h1>
                
                <div class="flex items-center justify-center gap-2 mb-4">
                    <p class="text-[9px] uppercase tracking-[0.3em] text-gray-400 font-semibold">Live Gallery</p>
                    <button onclick="forceVisualRefresh(event)" class="text-gray-400 hover:text-wedding-gold transition-colors p-1 rounded-full active:bg-gray-100">
                        <i data-lucide="refresh-cw" class="w-3 h-3"></i>
                    </button>
                </div>
                
                <button onclick="triggerUpload()" class="bg-wedding-dark text-white rounded-full px-6 py-3 font-medium uppercase tracking-widest text-[11px] shadow-lg flex items-center justify-center gap-3 mx-auto active:scale-95 transition-all w-full max-w-xs border border-gray-800">
                    <div class="relative shrink-0">
                        <i data-lucide="camera" class="w-5 h-5"></i>
                        <div class="absolute -bottom-1 -right-2 bg-wedding-gold text-white rounded-full w-3.5 h-3.5 flex items-center justify-center text-[10px] font-bold">+</div>
                    </div>
                    Carica qui le tue foto
                </button>
            </header>
        </div>

        <div id="gallery-grid" class="grid grid-cols-2 gap-3 w-full max-w-2xl mx-auto px-3">
            </div>
    </div>

    <input type="file" id="file-input" accept="image/*" multiple hidden onchange="handleFileSelection(event)">

    <div id="lightbox-modal" class="fixed inset-0 z-[110] bg-black/95 hidden flex-col items-center justify-center touch-none">
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white/50 hover:text-white p-2 z-50 transition-colors"><i data-lucide="x" class="w-8 h-8"></i></button>
        <button onclick="prevLightbox(event)" class="absolute left-2 top-1/2 -translate-y-1/2 text-white/50 hover:text-white p-4 z-50 transition-colors"><i data-lucide="chevron-left" class="w-10 h-10 drop-shadow-lg"></i></button>
        <button onclick="nextLightbox(event)" class="absolute right-2 top-1/2 -translate-y-1/2 text-white/50 hover:text-white p-4 z-50 transition-colors"><i data-lucide="chevron-right" class="w-10 h-10 drop-shadow-lg"></i></button>

        <img id="lightbox-img" src="" class="max-w-full max-h-[85vh] object-contain transition-transform duration-300 no-save" draggable="false">
        
        <div id="lightbox-comment-container" class="absolute bottom-10 inset-x-0 flex justify-center hidden">
            <p id="lightbox-comment" class="text-white/90 text-sm italic text-center px-6 py-2 bg-black/50 rounded-full backdrop-blur-sm max-w-sm"></p>
        </div>
    </div>

    <div id="likes-modal-overlay" class="fixed inset-0 z-[130] bg-black/40 hidden opacity-0 transition-opacity duration-300"></div>
    <div id="likes-modal" class="slide-up-modal fixed bottom-0 inset-x-0 z-[140] bg-white rounded-t-3xl shadow-2xl flex flex-col max-h-[70vh]">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-white rounded-t-3xl sticky top-0" id="likes-drag-handle">
            <h3 class="font-serif text-lg text-wedding-dark font-bold pl-2">Piace a...</h3>
            <button onclick="closeLikesModal()" class="text-gray-400 p-2 bg-gray-50 rounded-full hover:bg-gray-100"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="likes-list" class="overflow-y-auto p-6 flex flex-col gap-4 pb-12 bg-white"></div>
    </div>

    <div id="preview-modal" class="slide-up-modal fixed inset-0 z-[80] bg-white flex flex-col pt-12 pb-24 px-4">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-serif text-2xl text-wedding-dark">Le tue foto</h3>
            <button onclick="closePreview()" class="text-gray-400 p-2"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="preview-grid" class="overflow-y-auto grid grid-cols-2 gap-3 mb-6 p-1"></div>
        <div class="mt-auto">
            <button onclick="startUpload()" id="upload-btn" class="w-full bg-wedding-dark text-white font-medium uppercase tracking-widest text-xs py-4 rounded-xl flex justify-center items-center gap-2">
                <i data-lucide="send" class="w-4 h-4"></i> Condividi
            </button>
        </div>
    </div>

    <div id="audio-modal" class="slide-up-modal fixed inset-0 z-[80] bg-wedding-accent flex flex-col pt-10 px-6 overflow-y-auto pb-24">
        <div class="flex justify-between items-center w-full mb-4">
            <div class="w-8"></div> 
            <button onclick="forceVisualRefresh(event)" class="text-gray-400 hover:text-wedding-gold transition-colors p-2 rounded-full active:bg-white flex items-center gap-1">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> <span class="text-[9px] uppercase tracking-widest font-semibold">Aggiorna</span>
            </button>
            <button onclick="closeAudio()" class="text-gray-400 p-2"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        
        <div class="text-center mb-8 shrink-0">
            <h3 class="font-serif text-3xl text-wedding-dark mb-2">Audio Guestbook</h3>
            <p class="text-sm text-gray-500">Lascia un messaggio vocale agli sposi.<br>Hai 90 secondi.</p>
            
            <div class="relative flex justify-center items-center w-24 h-24 mx-auto mt-6 mb-4">
                <button id="mic-btn" onclick="toggleRecording()" class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg border-2 border-wedding-gold text-wedding-gold transition-all">
                    <i data-lucide="mic" class="w-8 h-8" id="mic-icon"></i>
                </button>
            </div>
            <p id="audio-timer" class="font-mono text-lg text-wedding-dark font-medium mb-4">00:00</p>
            
            <div id="audio-comment-container" class="mb-4 w-full max-w-xs mx-auto hidden">
                <input type="text" id="audio-comment" placeholder="Dedica (opzionale)..." class="w-full bg-white border border-gray-200 text-sm p-3 rounded-xl focus:outline-none focus:border-wedding-gold transition-colors text-center">
            </div>
            
            <button id="send-audio-btn" onclick="processAndUploadAudio()" disabled class="w-full max-w-xs mx-auto bg-wedding-dark text-white font-medium uppercase tracking-widest text-xs py-3 rounded-xl opacity-50 transition-all hidden">
                Invia Messaggio
            </button>
        </div>

        <div class="w-full h-px bg-gray-200 my-6 shrink-0"></div>

        <div class="flex-grow flex flex-col">
            <h4 class="font-serif text-lg text-wedding-dark mb-4 text-center">Messaggi Ricevuti</h4>
            <div id="audio-feed-grid" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 z-[120] bg-wedding-dark/95 backdrop-blur-md hidden flex-col items-center justify-center px-8">
        <button onclick="closePinModal()" class="absolute top-8 right-6 text-white/50 p-2"><i data-lucide="x" class="w-6 h-6"></i></button>
        <i data-lucide="lock" class="w-8 h-8 text-wedding-gold mb-4"></i>
        
        <h3 class="font-sans tracking-widest uppercase text-white text-sm mb-8 text-center">
            Area Riservata<br><span class="text-[10px] text-wedding-gold">agli sposi</span>
        </h3>
        
        <div class="flex gap-4 mb-10">
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
        </div>

        <div class="grid grid-cols-3 gap-6 w-full max-w-xs">
            <button onclick="enterPin('1')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10 touch-manipulation">1</button>
            <button onclick="enterPin('2')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10 touch-manipulation">2</button>
            <button onclick="enterPin('3')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10 touch-manipulation">3</button>
            <button onclick="enterPin('4')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10 touch-manipulation">4</button>
            <button onclick="enterPin('5')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10 touch-manipulation">5</button>
            <button onclick="enterPin('6')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10 touch-manipulation">6</button>
            <button onclick="enterPin('7')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10 touch-manipulation">7</button>
            <button onclick="enterPin('8')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10 touch-manipulation">8</button>
            <button onclick="enterPin('9')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10 touch-manipulation">9</button>
            <div></div>
            <button onclick="enterPin('0')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10 touch-manipulation">0</button>
            <button onclick="clearPin()" class="w-16 h-16 mx-auto text-white/50 text-xs uppercase tracking-widest active:text-white touch-manipulation">Canc</button>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 bg-white/95 backdrop-blur-md border-t border-gray-100 flex justify-center items-center h-[72px] z-[60] pb-safe gap-14">
        <button onclick="closeModals()" class="text-wedding-dark flex flex-col items-center w-16 opacity-70 hover:opacity-100 touch-manipulation">
            <i data-lucide="layout-grid" class="w-6 h-6 mb-1"></i>
            <span class="text-[9px] uppercase tracking-wider font-semibold">Foto</span>
        </button>

        <button onclick="triggerUpload()" class="bg-wedding-dark text-white w-16 h-16 rounded-full flex items-center justify-center shadow-xl shadow-gray-300 -mt-10 border-4 border-[#FAFAFA] active:scale-95 transition-transform relative z-10 touch-manipulation">
            <i data-lucide="camera" class="w-7 h-7"></i>
            <div class="absolute bottom-0 right-0 bg-wedding-gold text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold border-2 border-wedding-dark">+</div>
        </button>

        <button onclick="openAudio()" class="text-wedding-dark flex flex-col items-center w-16 opacity-70 hover:opacity-100 touch-manipulation">
            <i data-lucide="mic" class="w-6 h-6 mb-1"></i>
            <span class="text-[9px] uppercase tracking-wider font-semibold">Audio</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAKSDOdxKmz_NmqhuijaNGZXdjLBXnHCU1E",
          authDomain: "fir-config-6e53e.firebaseapp.com",
          projectId: "fir-config-6e53e",
          storageBucket: "fir-config-6e53e.firebasestorage.app",
          messagingSenderId: "790952608645",
          appId: "1:790952608645:web:a2f443e7be975ff0dc7aec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const galleryRef = collection(db, "live_gallery");
        const CLOUD_NAME = "dvjgznbzm";
        const UPLOAD_PRESET = "wedding_live_feed";

        let selectedFilesArray = [];
        let globalGalleryData = []; 
        let currentLightboxIndex = 0;
        let globalGuestName = ""; 
        let currentLikesMap = {}; 
        
        lucide.createIcons();

        // 0. GESTIONE SESSIONE (Evita di richiedere il nome se si ricarica la pagina)
        window.onload = () => {
            const savedSession = sessionStorage.getItem('wedding_session_name');
            if(savedSession) {
                globalGuestName = savedSession;
                document.getElementById('privacy-screen').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
            }
        };

        // 1. PRIVACY E NOME 
        window.toggleEnterBtn = () => {
            const btn = document.getElementById('btn-enter');
            btn.disabled = !document.getElementById('privacy-check').checked;
            btn.classList.toggle('opacity-50', btn.disabled);
            btn.classList.toggle('cursor-not-allowed', btn.disabled);
        };
        window.enterApp = () => {
            let inputName = document.getElementById('guest-name').value.trim();
            const randomCode = Math.floor(1000 + Math.random() * 9000);
            globalGuestName = inputName ? inputName : `Fantasma 👻 #${randomCode}`; 
            
            sessionStorage.setItem('wedding_session_name', globalGuestName);

            document.getElementById('privacy-screen').classList.add('fade-out-up');
            setTimeout(() => {
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
            }, 600);
        };

        // TASTO AGGIORNA VISUALE
        window.forceVisualRefresh = (e) => {
            if(e) {
                const icon = e.currentTarget.querySelector('i');
                icon.classList.add('animate-spin');
                setTimeout(() => icon.classList.remove('animate-spin'), 1000);
            }
            const scrollContainer = document.getElementById('audio-modal').classList.contains('open') ? document.getElementById('audio-modal') : window;
            scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // 2. SISTEMA DEI LIKE 
        window.toggleLike = async (docId, event) => {
            if(event) event.stopPropagation(); 
            
            const docRef = doc(db, "live_gallery", docId);
            const localLikes = JSON.parse(localStorage.getItem('wedding_likes') || '[]');

            try {
                if (localLikes.includes(docId)) {
                    localStorage.setItem('wedding_likes', JSON.stringify(localLikes.filter(id => id !== docId)));
                    await updateDoc(docRef, { likes: arrayRemove(globalGuestName) });
                } else {
                    localLikes.push(docId);
                    localStorage.setItem('wedding_likes', JSON.stringify(localLikes));
                    await updateDoc(docRef, { likes: arrayUnion(globalGuestName) });
                }
            } catch (e) { console.log("Errore aggiornamento like", e); }
        };

        // LISTA LIKE (MODAL)
        window.openLikesModal = (docId, event) => {
            if(event) event.stopPropagation();
            const likesArr = currentLikesMap[docId] || [];
            const listEl = document.getElementById('likes-list');
            listEl.innerHTML = '';
            
            if(likesArr.length === 0) {
                listEl.innerHTML = '<p class="text-gray-400 text-sm text-center font-serif italic mt-4">Nessun like ancora.</p>';
            } else {
                [...likesArr].reverse().forEach(liker => {
                    const displayName = liker.startsWith("Fantasma") ? "Un Fantasma 👻" : liker;
                    listEl.insertAdjacentHTML('beforeend', `
                        <div class="flex items-center gap-4 border-b border-gray-50 pb-3">
                            <div class="w-10 h-10 rounded-full bg-wedding-accent flex items-center justify-center text-wedding-gold shrink-0 border border-wedding-gold/20">
                                <i data-lucide="user" class="w-5 h-5"></i>
                            </div>
                            <span class="text-sm font-semibold text-wedding-dark">${displayName}</span>
                        </div>
                    `);
                });
            }
            lucide.createIcons();
            const overlay = document.getElementById('likes-modal-overlay');
            const modal = document.getElementById('likes-modal');
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            modal.classList.add('open');
        };

        window.closeLikesModal = () => {
            const overlay = document.getElementById('likes-modal-overlay');
            const modal = document.getElementById('likes-modal');
            overlay.classList.add('opacity-0');
            modal.classList.remove('open');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        };

        document.getElementById('likes-modal-overlay').addEventListener('click', closeLikesModal);
        
        let likesTouchStartY = 0;
        document.getElementById('likes-modal').addEventListener('touchstart', e => { likesTouchStartY = e.changedTouches[0].screenY; }, {passive: true});
        document.getElementById('likes-modal').addEventListener('touchend', e => {
            let touchEndY = e.changedTouches[0].screenY;
            if (touchEndY > likesTouchStartY + 60) window.closeLikesModal(); 
        }, {passive: true});

        // 3. UPLOAD FOTO E ANTEPRIMA
        window.triggerUpload = () => { document.getElementById('file-input').click(); };
        window.handleFileSelection = (event) => {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;
            selectedFilesArray = files.map(f => ({ file: f, flipped: false, comment: '' }));
            renderPreviewGrid();
            document.getElementById('preview-modal').classList.add('open');
            event.target.value = '';
        };

        window.updateSingleComment = (index, val) => { selectedFilesArray[index].comment = val; };

        window.renderPreviewGrid = () => {
            const grid = document.getElementById('preview-grid');
            grid.innerHTML = '';
            selectedFilesArray.forEach((item, index) => {
                const url = URL.createObjectURL(item.file);
                const flipClass = item.flipped ? '-scale-x-100' : '';
                grid.insertAdjacentHTML('beforeend', `
                    <div class="flex flex-col gap-1 bg-white rounded-lg border border-gray-100 p-2 shadow-sm">
                        <div class="relative aspect-square rounded-md overflow-hidden bg-gray-100">
                            <img src="${url}" class="w-full h-full object-cover ${flipClass}">
                            <button onclick="removeFile(${index})" class="absolute top-1 right-1 bg-white/80 p-1.5 rounded-full text-red-500 shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                        <div class="flex items-center gap-1 mt-1">
                            <input type="text" oninput="updateSingleComment(${index}, this.value)" value="${item.comment}" placeholder="Dedica..." class="w-full bg-gray-50 border border-gray-200 text-[10px] p-2 rounded focus:outline-none focus:border-wedding-gold transition-colors">
                            <button onclick="toggleFlip(${index})" class="shrink-0 p-2 text-gray-500 border border-gray-200 rounded bg-gray-50 hover:bg-gray-100 transition-colors">
                                <i data-lucide="flip-horizontal" class="w-3 h-3"></i>
                            </button>
                        </div>
                    </div>
                `);
            });
            lucide.createIcons();
        };

        window.toggleFlip = (index) => { selectedFilesArray[index].flipped = !selectedFilesArray[index].flipped; renderPreviewGrid(); };
        window.removeFile = (index) => { selectedFilesArray.splice(index, 1); if (selectedFilesArray.length === 0) closePreview(); else renderPreviewGrid(); };
        window.closePreview = () => { document.getElementById('preview-modal').classList.remove('open'); selectedFilesArray = []; };
        window.closeModals = () => { closePreview(); closeAudio(); closePinModal(); closeLikesModal(); };

        const getFlippedFile = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob((blob) => resolve(new File([blob], file.name, { type: file.type })), file.type);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        window.startUpload = async () => {
            if (selectedFilesArray.length === 0) return;
            const btn = document.getElementById('upload-btn');
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Invio...';
            btn.disabled = true;

            const finalGuestName = globalGuestName.startsWith("Fantasma") ? "" : globalGuestName;

            for (let i = 0; i < selectedFilesArray.length; i++) {
                let item = selectedFilesArray[i];
                try {
                    let fileToUpload = item.flipped ? await getFlippedFile(item.file) : item.file;
                    const formData = new FormData();
                    formData.append("file", fileToUpload);
                    formData.append("upload_preset", UPLOAD_PRESET);
                    
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
                    const data = await res.json();
                    
                    await addDoc(galleryRef, { 
                        url: data.secure_url, 
                        type: 'image', 
                        comment: item.comment, 
                        guestName: finalGuestName, 
                        likes: [],
                        timestamp: serverTimestamp() 
                    });
                } catch (err) { console.error(err); }
            }
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#1A1A1A', '#D4AF37', '#FAFAFA'] });
            btn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> Condividi';
            btn.disabled = false;
            closePreview();
        };

        // 4. AUDIO LOGIC
        let mediaRecorder; let audioChunks = []; let recordingInterval; let seconds = 0;
        window.openAudio = () => { document.getElementById('audio-modal').classList.add('open'); };
        window.closeAudio = () => { 
            document.getElementById('audio-modal').classList.remove('open');
            document.getElementById('audio-comment-container').classList.add('hidden');
            document.getElementById('audio-comment').value = '';
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('mic-btn');
            const icon = document.getElementById('mic-icon');
            const timerDisplay = document.getElementById('audio-timer');
            const sendBtn = document.getElementById('send-audio-btn');
            const commentBox = document.getElementById('audio-comment-container');

            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    sendBtn.classList.add('hidden');
                    commentBox.classList.add('hidden');

                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        sendBtn.classList.remove('hidden');
                        commentBox.classList.remove('hidden');
                        sendBtn.disabled = false;
                        sendBtn.innerHTML = 'Invia Messaggio';
                    };

                    mediaRecorder.start();
                    btn.classList.add('recording-pulse', 'border-red-500', 'text-red-500');
                    icon.setAttribute('data-lucide', 'square'); lucide.createIcons();
                    
                    seconds = 0;
                    recordingInterval = setInterval(() => {
                        seconds++;
                        let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                        let s = (seconds % 60).toString().padStart(2, '0');
                        timerDisplay.innerText = `${m}:${s}`;
                        if (seconds >= 90) toggleRecording(); 
                    }, 1000);
                } catch (err) { alert("Consenti l'accesso al microfono."); }
            } else {
                mediaRecorder.stop();
                clearInterval(recordingInterval);
                btn.classList.remove('recording-pulse', 'border-red-500', 'text-red-500');
                icon.setAttribute('data-lucide', 'mic'); lucide.createIcons();
                mediaRecorder.stream.getTracks().forEach(track => track.stop()); 
            }
        };

        window.processAndUploadAudio = async () => {
            const btn = document.getElementById('send-audio-btn');
            const commentBox = document.getElementById('audio-comment-container');
            const comment = document.getElementById('audio-comment').value.trim();

            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline-block"></i> Salvataggio...';
            btn.disabled = true;

            const finalGuestName = globalGuestName.startsWith("Fantasma") ? "" : globalGuestName;

            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append("file", audioBlob, "guestbook_audio.webm");
            formData.append("upload_preset", UPLOAD_PRESET);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, { method: "POST", body: formData });
                const data = await res.json();
                
                await addDoc(galleryRef, { 
                    url: data.secure_url, 
                    type: 'audio', 
                    comment: comment, 
                    guestName: finalGuestName, 
                    likes: [],
                    timestamp: serverTimestamp() 
                });

                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#D4AF37', '#1A1A1A'] });
                document.getElementById('audio-timer').innerText = "00:00";
                document.getElementById('audio-comment').value = '';
                commentBox.classList.add('hidden');
            } catch (err) { alert("Errore durante l'invio dell'audio."); } 
            finally { btn.classList.add('hidden'); }
        };

        // 5. LIGHTBOX
        window.openLightbox = (index) => {
            currentLightboxIndex = index;
            updateLightboxUI();
            document.getElementById('lightbox-modal').classList.remove('hidden');
            document.getElementById('lightbox-modal').classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        };
        window.closeLightbox = () => {
            document.getElementById('lightbox-modal').classList.remove('flex');
            document.getElementById('lightbox-modal').classList.add('hidden');
            document.body.style.overflow = ''; 
        };
        window.updateLightboxUI = () => {
            if (globalGalleryData.length === 0) return;
            const item = globalGalleryData[currentLightboxIndex];
            const highResUrl = item.url.replace("/upload/", "/upload/w_1200,c_limit,q_auto/");
            document.getElementById('lightbox-img').src = highResUrl;
            
            const commentContainer = document.getElementById('lightbox-comment-container');
            const commentText = document.getElementById('lightbox-comment');
            
            const cleanAuthor = item.guestName.startsWith("Fantasma") ? "Un Fantasma 👻" : item.guestName;
            
            let authorStr = cleanAuthor ? `<span class="font-bold text-wedding-gold">${cleanAuthor}</span>` : '';
            let commentStr = item.comment ? `"${item.comment}"` : '';
            
            if(authorStr || commentStr) {
                let separator = (authorStr && commentStr) ? ': ' : '';
                commentText.innerHTML = `${authorStr}${separator}${commentStr}`;
                commentContainer.classList.remove('hidden');
            } else {
                commentContainer.classList.add('hidden');
            }
        };
        window.prevLightbox = (e) => {
            if(e) e.stopPropagation();
            currentLightboxIndex = (currentLightboxIndex - 1 + globalGalleryData.length) % globalGalleryData.length;
            updateLightboxUI();
        };
        window.nextLightbox = (e) => {
            if(e) e.stopPropagation();
            currentLightboxIndex = (currentLightboxIndex + 1) % globalGalleryData.length;
            updateLightboxUI();
        };

        let touchStartX = 0; let touchEndX = 0;
        const lightboxModal = document.getElementById('lightbox-modal');
        lightboxModal.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        lightboxModal.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            if (touchEndX < touchStartX - 50) window.nextLightbox();
            if (touchEndX > touchStartX + 50) window.prevLightbox();
        }, {passive: true});

        // 6. MOTORE SMART DOM UPDATE (Nessun Lampeggio o Salto dello schermo)
        const q = query(galleryRef, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const gallery = document.getElementById("gallery-grid");
            const audioFeed = document.getElementById("audio-feed-grid");
            
            // Se ci sono dati, elimina i messaggi di stato vuoto
            if (!snapshot.empty) {
                const es1 = document.getElementById("empty-state");
                if (es1) es1.remove();
                const es2 = document.getElementById("empty-audio-state");
                if (es2) es2.remove();
            }
            
            globalGalleryData = []; 
            const localLikes = JSON.parse(localStorage.getItem('wedding_likes') || '[]');

            // Pulizia: Rimuove dal DOM gli elementi eliminati (Es. cancellati dall'admin)
            const currentDocIds = snapshot.docs.map(doc => "card-" + doc.id);
            Array.from(gallery.children).forEach(child => {
                if (child.id && child.id.startsWith('card-') && !currentDocIds.includes(child.id)) child.remove();
            });
            Array.from(audioFeed.children).forEach(child => {
                if (child.id && child.id.startsWith('card-') && !currentDocIds.includes(child.id)) child.remove();
            });

            let imageIndex = 0;
            let audioIndex = 0;

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const docId = docSnap.id;
                
                currentLikesMap[docId] = data.likes || [];
                const likesArr = data.likes || [];
                const likesCount = likesArr.length;
                
                // Il cuore è rosso SOLO se l'utente attuale (il suo browser locale) ha messo like
                const isLiked = localLikes.includes(docId);
                const heartClass = isLiked ? 'fill-red-500 text-red-500' : 'text-gray-400';
                const imageBadgeHeartClass = isLiked ? 'fill-red-500 text-red-500' : 'text-white';

                if (data.type === 'audio') {
                    const dateStr = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Ora';
                    const audioAuthorRaw = data.guestName ? data.guestName : 'Fantasma 👻';
                    const audioAuthor = audioAuthorRaw.startsWith("Fantasma") ? "Un Fantasma 👻" : audioAuthorRaw;
                    const audioCommentHtml = data.comment ? `<p class="text-[10px] text-gray-500 italic mb-2">"${data.comment}"</p>` : '';
                    
                    let likesText = '<span class="text-[9px] text-gray-400 font-medium ml-auto">Sii il primo!</span>';
                    if (likesCount > 0) {
                        const lastLikerRaw = likesArr[likesArr.length - 1];
                        const lastLiker = lastLikerRaw.startsWith("Fantasma") ? "un Fantasma 👻" : lastLikerRaw;
                        likesText = `<span class="text-[9px] text-gray-400 font-medium ml-auto cursor-pointer" onclick="openLikesModal('${docId}', event)">Piace a ${lastLiker} ${likesCount > 1 ? `e altri ${likesCount - 1}` : ''}</span>`;
                    }

                    // Se non esiste la card, la crea. Altrimenti l'aggiorna.
                    let card = document.getElementById(`card-${docId}`);
                    if (!card) {
                        card = document.createElement('div');
                        card.id = `card-${docId}`;
                        card.className = "photo-reveal bg-white border border-gray-100 rounded-xl p-4 shadow-sm flex flex-col";
                        card.innerHTML = `
                            <div class="flex items-center gap-3">
                                <div class="bg-wedding-accent rounded-full p-3 text-wedding-gold shrink-0"><i data-lucide="mic" class="w-5 h-5"></i></div>
                                <div class="flex-grow min-w-0">
                                    <p class="text-xs font-semibold text-wedding-dark mb-1">Vocale di <span class="text-wedding-gold">${audioAuthor}</span></p>
                                    ${audioCommentHtml}
                                    <audio controls controlsList="nodownload" src="${data.url}" class="w-full h-8 scale-[0.85] origin-left"></audio>
                                </div>
                            </div>
                            <div class="flex items-center mt-3 pt-3 border-t border-gray-50">
                                <button onclick="toggleLike('${docId}', event)" class="p-1 active:scale-90 transition-transform" id="btn-like-${docId}">
                                    <i data-lucide="heart" class="w-5 h-5 ${heartClass}"></i>
                                </button>
                                <div id="text-like-${docId}" class="ml-auto flex items-center">${likesText}</div>
                                <span class="text-[9px] text-gray-300 ml-3 shrink-0">${dateStr}</span>
                            </div>
                        `;
                    } else {
                        // Aggiorna solo le parti volatili (I Cuori) senza far lampeggiare l'immagine
                        document.getElementById(`btn-like-${docId}`).innerHTML = `<i data-lucide="heart" class="w-5 h-5 ${heartClass}"></i>`;
                        document.getElementById(`text-like-${docId}`).innerHTML = likesText;
                    }

                    // Assicura l'ordine corretto nel DOM
                    if (audioFeed.children[audioIndex] !== card) {
                        audioFeed.insertBefore(card, audioFeed.children[audioIndex]);
                    }
                    audioIndex++;

                } else {
                    const pIndex = globalGalleryData.length;
                    globalGalleryData.push({ url: data.url, comment: data.comment, guestName: data.guestName });
                    
                    const optimizedUrl = data.url.replace("/upload/", "/upload/w_400,h_400,c_fill,g_auto,q_auto,f_auto/");
                    const cleanAuthor = data.guestName.startsWith("Fantasma") ? "" : data.guestName;
                    let authorText = cleanAuthor ? `<span class="font-bold text-wedding-gold">${cleanAuthor}</span>` : '';
                    let commentPart = data.comment ? `"${data.comment}"` : '';
                    let separator = (authorText && commentPart) ? ': ' : '';
                    const commentHtml = (authorText || commentPart) ? `<div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-2 pt-6 text-white text-[9px] leading-tight z-10"><p class="truncate pr-6">${authorText}${separator}${commentPart}</p></div>` : '';

                    let likesBadge = '';
                    let likesText = '<span class="text-[9px] text-gray-400 font-medium">Sii il primo!</span>';
                    
                    if (likesCount > 0) {
                        const lastLikerRaw = likesArr[likesArr.length - 1];
                        const lastLiker = lastLikerRaw.startsWith("Fantasma") ? "un Fantasma 👻" : lastLikerRaw;
                        const otherTxt = (likesCount - 1) > 0 ? ` e altri ${likesCount - 1}` : '';
                        
                        likesBadge = `<div class="absolute top-1 left-1 z-20 bg-black/40 backdrop-blur-sm rounded-full px-1.5 py-0.5 flex items-center gap-1 shadow-sm"><i data-lucide="heart" class="w-2.5 h-2.5 ${imageBadgeHeartClass}"></i><span class="text-[7px] text-white font-medium max-w-[60px] truncate">Piace a ${lastLiker}${otherTxt}</span></div>`;
                        
                        if (likesCount === 1) {
                            likesText = `<span class="text-[9px] text-gray-500 font-medium w-full truncate">Piace a <span class="font-bold text-wedding-dark">${lastLiker}</span></span>`;
                        } else {
                            likesText = `<span class="text-[9px] text-gray-500 font-medium w-full truncate">Piace a <span class="font-bold text-wedding-dark">${lastLiker}</span> e altri ${likesCount - 1}</span>`;
                        }
                    }

                    let card = document.getElementById(`card-${docId}`);
                    if (!card) {
                        card = document.createElement('div');
                        card.id = `card-${docId}`;
                        card.className = "photo-reveal bg-white border border-gray-100 rounded-lg shadow-sm flex flex-col overflow-hidden relative";
                        card.setAttribute("oncontextmenu", "return false;");
                        card.innerHTML = `
                            <div class="aspect-square relative overflow-hidden cursor-pointer" onclick="openLightbox(${pIndex})" id="img-container-${docId}">
                                <div id="badge-container-${docId}">${likesBadge}</div>
                                <img src="${optimizedUrl}" class="w-full h-full object-cover no-save" draggable="false">
                                <div class="absolute inset-0 z-0 no-save"></div>
                                ${commentHtml}
                            </div>
                            <div class="p-1.5 flex items-center justify-between bg-white h-9 border-t border-gray-50">
                                <div class="flex items-center gap-1.5 w-full">
                                    <button onclick="toggleLike('${docId}', event)" class="p-1 active:scale-90 transition-transform shrink-0" id="btn-like-${docId}">
                                        <i data-lucide="heart" class="w-4 h-4 ${heartClass}"></i>
                                    </button>
                                    <div class="flex-grow min-w-0 pr-1 flex items-center cursor-pointer active:opacity-50" onclick="openLikesModal('${docId}', event)" id="text-like-${docId}">
                                        ${likesText}
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        // Aggiorna dinamicamente senza ricaricare l'immagine
                        document.getElementById(`btn-like-${docId}`).innerHTML = `<i data-lucide="heart" class="w-4 h-4 ${heartClass}"></i>`;
                        document.getElementById(`text-like-${docId}`).innerHTML = likesText;
                        document.getElementById(`badge-container-${docId}`).innerHTML = likesBadge;
                        document.getElementById(`img-container-${docId}`).setAttribute("onclick", `openLightbox(${pIndex})`);
                    }

                    if (gallery.children[imageIndex] !== card) {
                        gallery.insertBefore(card, gallery.children[imageIndex]);
                    }
                    imageIndex++;
                }
            });

            // Se la galleria è interamente vuota, rimetti i box Rompighiaccio
            if (imageIndex === 0) {
                gallery.innerHTML = `
                    <div id="empty-state" class="col-span-2 aspect-video relative bg-gradient-to-br from-wedding-accent to-white border border-wedding-gold/20 rounded-xl flex flex-col items-center justify-center p-6 text-center shadow-sm">
                        <i data-lucide="sparkles" class="w-8 h-8 text-wedding-gold mb-3 opacity-80"></i>
                        <p class="font-serif text-lg text-wedding-dark italic leading-relaxed">Rompi il ghiaccio!<br><span class="text-sm text-gray-500 font-sans">Sii il primo a scattare una foto.</span></p>
                    </div>
                `;
            }
            if (audioIndex === 0) {
                audioFeed.innerHTML = `
                    <div id="empty-audio-state" class="bg-gradient-to-br from-wedding-accent to-white border border-wedding-gold/20 rounded-xl p-5 shadow-sm flex flex-col items-center text-center">
                        <div class="bg-white rounded-full p-3 shadow-sm mb-3"><i data-lucide="mic" class="w-6 h-6 text-wedding-gold"></i></div>
                        <p class="font-serif text-sm text-wedding-dark italic">"Il microfono è acceso.<br>Lascia un messaggio!"</p>
                    </div>
                `;
            }
            
            // Riattiva le icone solo per gli elementi aggiornati
            lucide.createIcons();
        });

        // 7. HONEYPOT E PIN PAD 
        let adminTapCount = 0; let adminTapTimer = null; let isSecretUnlocked = false; let failedAttempts = 0; let enteredPin = ""; const PIN_CODE = "2026";
        window.openPinModal = () => { document.getElementById('pin-modal').classList.remove('hidden'); document.getElementById('pin-modal').classList.add('flex'); clearPin(); };
        
        window.handleSecretAdmin = (e) => {
            if(e) e.preventDefault();
            adminTapCount++;
            
            const lockIcon = document.getElementById('lock-icon');
            lockIcon.classList.add('scale-125', 'text-wedding-gold');
            setTimeout(() => lockIcon.classList.remove('scale-125', 'text-wedding-gold'), 150);
            
            clearTimeout(adminTapTimer);

            if (adminTapCount >= 10) {
                isSecretUnlocked = true; 
                confetti({ particleCount: 15, spread: 30, origin: { y: 0.9 }, colors: ['#D4AF37'] }); 
                openPinModal();
                adminTapCount = 0; 
            } else {
                adminTapTimer = setTimeout(() => {
                    if (adminTapCount > 0) {
                        isSecretUnlocked = false; 
                        adminTapCount = 0; 
                        openPinModal(); 
                    }
                }, 800); 
            }
        };

        window.closePinModal = () => { document.getElementById('pin-modal').classList.remove('flex'); document.getElementById('pin-modal').classList.add('hidden'); clearPin(); };
        window.enterPin = (num) => {
            if (enteredPin.length < 4) {
                enteredPin += num; updatePinDots();
                if (enteredPin.length === 4) setTimeout(() => checkPin(), 200);
            }
        };
        window.clearPin = () => { enteredPin = ""; updatePinDots(); };
        window.updatePinDots = () => {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, index) => { if (index < enteredPin.length) dot.classList.add('bg-wedding-gold'); else dot.classList.remove('bg-wedding-gold'); });
        };
        window.checkPin = () => {
            if (enteredPin === PIN_CODE && isSecretUnlocked) {
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 }, colors: ['#D4AF37', '#FAFAFA'] });
                setTimeout(() => { window.location.href = "admin.html"; }, 800);
            } else {
                failedAttempts++;
                const dotContainer = document.querySelector('.pin-dot').parentElement;
                dotContainer.classList.add('translate-x-2');
                setTimeout(() => dotContainer.classList.remove('translate-x-2'), 100);
                setTimeout(() => dotContainer.classList.add('-translate-x-2'), 200);
                setTimeout(() => dotContainer.classList.remove('-translate-x-2'), 300);
                if (failedAttempts >= 3) setTimeout(() => window.location.reload(), 500); 
                else setTimeout(() => clearPin(), 400);
            }
        };
    </script>
</body>
</html>
