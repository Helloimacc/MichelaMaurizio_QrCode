<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Michela & Maurizio | Wedding App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { wedding: { light: '#FAFAFA', dark: '#1A1A1A', gold: '#D4AF37', accent: '#F9F6F0' } },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>

    <style>
        body { background-color: #FAFAFA; color: #1A1A1A; -webkit-tap-highlight-color: transparent; }
        
        /* Modals and Animations */
        .fade-out-up { animation: fadeOutUp 0.8s cubic-bezier(0.8, 0, 0.2, 1) forwards; }
        @keyframes fadeOutUp { to { opacity: 0; transform: translateY(-50px); pointer-events: none; display: none; } }
        
        .slide-up-modal { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-up-modal.open { transform: translateY(0); }

        .photo-reveal { animation: reveal 0.5s ease-out forwards; opacity: 0; }
        @keyframes reveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Custom Checkbox */
        .custom-checkbox:checked { background-color: #D4AF37; border-color: #D4AF37; }
        
        /* Audio Pulse */
        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
    </style>
</head>
<body class="relative min-h-[100dvh] overflow-x-hidden flex flex-col font-sans">

    <div id="privacy-screen" class="fixed inset-0 z-[100] bg-wedding-light flex flex-col items-center justify-center p-8">
        <div class="max-w-sm w-full text-center">
            <h1 class="font-serif text-4xl text-wedding-dark mb-2">Michela <span class="text-wedding-gold italic">&</span> Maurizio</h1>
            <p class="text-xs uppercase tracking-widest text-gray-400 mb-10">09 Maggio 2026</p>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8 text-left">
                <h3 class="font-serif text-lg mb-4 text-center">Regole dell'Evento 📜</h3>
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" id="privacy-check" onchange="toggleEnterBtn()" class="custom-checkbox mt-1 w-5 h-5 rounded border-gray-300 text-wedding-gold focus:ring-wedding-gold transition-colors">
                    <span class="text-xs text-gray-600 leading-relaxed font-medium">Giuro solennemente di caricare solo prove compromettenti, sorrisi giganti e di far divertire gli sposi! (Accetto condizioni privacy)</span>
                </label>
            </div>
            
            <button id="btn-enter" disabled onclick="enterApp()" class="w-full bg-wedding-dark text-white font-medium uppercase tracking-widest text-xs py-4 rounded-xl opacity-50 cursor-not-allowed transition-all">
                Entra nella Gallery
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden flex-col items-center w-full flex-grow px-2 pt-8 pb-24">
        <header class="text-center mb-8">
            <h2 class="font-serif text-3xl text-wedding-dark mb-1">Live Gallery</h2>
            <div class="h-px w-12 bg-wedding-gold mx-auto mt-3"></div>
        </header>

        <div id="gallery-grid" class="grid grid-cols-3 gap-1 w-full max-w-2xl mx-auto">
            <p id="empty-state" class="col-span-3 text-center text-gray-400 italic font-serif py-10">Inizia a riempire questo spazio di ricordi.</p>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*" multiple hidden onchange="handleFileSelection(event)">

    <div id="preview-modal" class="slide-up-modal fixed inset-0 z-[80] bg-white flex flex-col pt-12 pb-24 px-4">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-serif text-2xl text-wedding-dark">Condividi</h3>
            <button onclick="closePreview()" class="text-gray-400 p-2"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        
        <div id="preview-grid" class="overflow-y-auto grid grid-cols-2 gap-3 mb-4"></div>
        
        <div class="mb-4">
            <input type="text" id="photo-comment" placeholder="Aggiungi una dedica (opzionale)..." class="w-full bg-gray-50 border border-gray-200 text-sm p-4 rounded-xl focus:outline-none focus:border-wedding-gold transition-colors">
        </div>

        <div class="mt-auto">
            <button onclick="startUpload()" id="upload-btn" class="w-full bg-wedding-dark text-white font-medium uppercase tracking-widest text-xs py-4 rounded-xl flex justify-center items-center gap-2">
                <i data-lucide="send" class="w-4 h-4"></i> Invia alla Gallery
            </button>
        </div>
    </div>

    <div id="audio-modal" class="slide-up-modal fixed inset-0 z-[80] bg-wedding-accent flex flex-col items-center justify-center px-6">
        <button onclick="closeAudio()" class="absolute top-8 right-6 text-gray-400 p-2"><i data-lucide="x" class="w-6 h-6"></i></button>
        
        <div class="text-center mb-10">
            <h3 class="font-serif text-3xl text-wedding-dark mb-2">Audio Guestbook</h3>
            <p class="text-sm text-gray-500">Lascia un messaggio vocale agli sposi.<br>Hai 90 secondi.</p>
        </div>

        <div class="relative flex justify-center items-center w-32 h-32 mb-8">
            <button id="mic-btn" onclick="toggleRecording()" class="w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-lg border-2 border-wedding-gold text-wedding-gold transition-all">
                <i data-lucide="mic" class="w-10 h-10" id="mic-icon"></i>
            </button>
        </div>
        
        <p id="audio-timer" class="font-mono text-xl text-wedding-dark font-medium mb-8">00:00</p>
        
        <button id="send-audio-btn" disabled class="w-full max-w-xs bg-wedding-dark text-white font-medium uppercase tracking-widest text-xs py-4 rounded-xl opacity-50 transition-all hidden">
            Invia Messaggio
        </button>
    </div>

    <nav class="fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around items-center px-2 py-2 z-[60] pb-safe">
        <button onclick="closeModals()" class="text-wedding-dark flex flex-col items-center w-16 opacity-70 hover:opacity-100">
            <i data-lucide="layout-grid" class="w-5 h-5 mb-1"></i>
            <span class="text-[9px] uppercase tracking-wider font-semibold">Live</span>
        </button>

        <button onclick="triggerUpload()" class="bg-wedding-dark text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md active:scale-95 transition-transform">
            <i data-lucide="plus" class="w-6 h-6"></i>
        </button>

        <button onclick="openAudio()" class="text-wedding-dark flex flex-col items-center w-16 opacity-70 hover:opacity-100">
            <i data-lucide="mic" class="w-5 h-5 mb-1"></i>
            <span class="text-[9px] uppercase tracking-wider font-semibold">Audio</span>
        </button>

        <button onclick="alert('Area Sposi in arrivo!')" class="text-wedding-dark flex flex-col items-center w-16 opacity-30 hover:opacity-100">
            <i data-lucide="lock" class="w-5 h-5 mb-1"></i>
            <span class="text-[9px] uppercase tracking-wider font-semibold">Sposi</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAKSDOdxKmz_NmqhuijaNGZXdjLBXnHCU1E",
          authDomain: "fir-config-6e53e.firebaseapp.com",
          projectId: "fir-config-6e53e",
          storageBucket: "fir-config-6e53e.firebasestorage.app",
          messagingSenderId: "790952608645",
          appId: "1:790952608645:web:a2f443e7be975ff0dc7aec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const galleryRef = collection(db, "live_gallery");
        const audioRef = collection(db, "live_audio"); // Nuova collection per gli audio

        const CLOUD_NAME = "dvjgznbzm";
        const UPLOAD_PRESET = "wedding_live_feed";

        let selectedFilesArray = [];
        lucide.createIcons();

        // 1. GESTIONE PRIVACY
        window.toggleEnterBtn = () => {
            const btn = document.getElementById('btn-enter');
            if(document.getElementById('privacy-check').checked) {
                btn.disabled = false; btn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                btn.disabled = true; btn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        };

        window.enterApp = () => {
            document.getElementById('privacy-screen').classList.add('fade-out-up');
            setTimeout(() => {
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
            }, 600);
        };

        // 2. GESTIONE FOTO & ANTEPRIMA
        window.triggerUpload = () => { document.getElementById('file-input').click(); };
        
        window.handleFileSelection = (event) => {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;
            selectedFilesArray = files.map(f => ({ file: f, flipped: false }));
            renderPreviewGrid();
            document.getElementById('preview-modal').classList.add('open');
            document.getElementById('photo-comment').value = ''; // Reset commento
            event.target.value = '';
        };

        window.renderPreviewGrid = () => {
            const grid = document.getElementById('preview-grid');
            grid.innerHTML = '';
            selectedFilesArray.forEach((item, index) => {
                const url = URL.createObjectURL(item.file);
                const flipClass = item.flipped ? '-scale-x-100' : '';
                grid.insertAdjacentHTML('beforeend', `
                    <div class="flex flex-col gap-1 bg-white rounded-lg">
                        <div class="relative aspect-square rounded-lg overflow-hidden bg-gray-100">
                            <img src="${url}" class="w-full h-full object-cover ${flipClass}">
                            <button onclick="removeFile(${index})" class="absolute top-1 right-1 bg-white/80 p-1.5 rounded-full text-red-500 shadow-sm"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                        </div>
                        <button onclick="toggleFlip(${index})" class="py-1 text-gray-500 text-[10px] uppercase font-bold flex items-center justify-center gap-1 border border-gray-200 rounded-md mt-1">
                            <i data-lucide="flip-horizontal" class="w-3 h-3"></i> Specchia
                        </button>
                    </div>
                `);
            });
            lucide.createIcons();
        };

        window.toggleFlip = (index) => { selectedFilesArray[index].flipped = !selectedFilesArray[index].flipped; renderPreviewGrid(); };
        window.removeFile = (index) => { selectedFilesArray.splice(index, 1); if (selectedFilesArray.length === 0) closePreview(); else renderPreviewGrid(); };
        
        window.closePreview = () => { document.getElementById('preview-modal').classList.remove('open'); selectedFilesArray = []; };
        window.closeModals = () => { closePreview(); closeAudio(); };

        const getFlippedFile = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob((blob) => resolve(new File([blob], file.name, { type: file.type })), file.type);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        window.startUpload = async () => {
            if (selectedFilesArray.length === 0) return;
            const btn = document.getElementById('upload-btn');
            const comment = document.getElementById('photo-comment').value.trim();
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Invio...';
            btn.disabled = true;

            for (let item of selectedFilesArray) {
                try {
                    let fileToUpload = item.flipped ? await getFlippedFile(item.file) : item.file;
                    const formData = new FormData();
                    formData.append("file", fileToUpload);
                    formData.append("upload_preset", UPLOAD_PRESET);

                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
                    const data = await res.json();

                    // Salvataggio su Firebase includendo il commento!
                    await addDoc(galleryRef, { 
                        url: data.secure_url, 
                        comment: comment, 
                        timestamp: serverTimestamp() 
                    });
                } catch (err) { console.error(err); }
            }

            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#1A1A1A', '#D4AF37', '#FAFAFA'] });
            btn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> Invia alla Gallery';
            btn.disabled = false;
            closePreview();
        };

        // 3. RENDER GALLERY (Griglia Pulita + Commenti)
        const q = query(galleryRef, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const gallery = document.getElementById("gallery-grid");
            const emptyState = document.getElementById("empty-state");
            if (!snapshot.empty && emptyState) emptyState.remove();
            
            gallery.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const optimizedUrl = data.url.replace("/upload/", "/upload/w_300,h_300,c_fill,g_auto,q_auto,f_auto/");
                
                // Se c'è un commento, mostra una piccola icona o il testo troncato
                const commentHtml = data.comment ? `<div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/70 to-transparent p-2 text-white text-[9px] truncate">${data.comment}</div>` : '';

                const imgHTML = `
                    <div class="photo-reveal aspect-square relative overflow-hidden bg-gray-100 rounded-sm">
                        <img src="${optimizedUrl}" class="w-full h-full object-cover">
                        ${commentHtml}
                    </div>
                `;
                gallery.insertAdjacentHTML('beforeend', imgHTML);
            });
        });

        // 4. AUDIO GUESTBOOK LOGIC (Struttura base)
        let mediaRecorder; let audioChunks = []; let recordingInterval; let seconds = 0;
        
        window.openAudio = () => { document.getElementById('audio-modal').classList.add('open'); };
        window.closeAudio = () => { document.getElementById('audio-modal').classList.remove('open'); };

        window.toggleRecording = async () => {
            const btn = document.getElementById('mic-btn');
            const icon = document.getElementById('mic-icon');
            const timerDisplay = document.getElementById('audio-timer');

            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = processAudio;

                    mediaRecorder.start();
                    btn.classList.add('recording-pulse', 'border-red-500', 'text-red-500');
                    icon.setAttribute('data-lucide', 'square'); lucide.createIcons();
                    
                    seconds = 0;
                    recordingInterval = setInterval(() => {
                        seconds++;
                        let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                        let s = (seconds % 60).toString().padStart(2, '0');
                        timerDisplay.innerText = `${m}:${s}`;
                        if (seconds >= 90) toggleRecording(); // Stop automatico a 90 sec
                    }, 1000);

                } catch (err) { alert("Per favore, consenti l'accesso al microfono per registrare."); }
            } else {
                mediaRecorder.stop();
                clearInterval(recordingInterval);
                btn.classList.remove('recording-pulse', 'border-red-500', 'text-red-500');
                icon.setAttribute('data-lucide', 'mic'); lucide.createIcons();
                mediaRecorder.stream.getTracks().forEach(track => track.stop()); // Libera il microfono
            }
        };

        const processAudio = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            // Qui inseriremo la logica di upload audio su Cloudinary e Firebase nel prossimo step!
            alert("Audio registrato con successo! (La logica di invio è pronta per essere collegata al database)");
            closeAudio();
        };

    </script>
</body>
</html>
