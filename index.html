<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Michela & Maurizio | Wedding App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { wedding: { light: '#FAFAFA', dark: '#1A1A1A', gold: '#D4AF37', accent: '#F9F6F0' } },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>

    <style>
        body { background-color: #FAFAFA; color: #1A1A1A; -webkit-tap-highlight-color: transparent; }
        
        .fade-out-up { animation: fadeOutUp 0.8s cubic-bezier(0.8, 0, 0.2, 1) forwards; }
        @keyframes fadeOutUp { to { opacity: 0; transform: translateY(-50px); pointer-events: none; display: none; } }
        
        .slide-up-modal { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-up-modal.open { transform: translateY(0); }

        .photo-reveal { animation: reveal 0.5s ease-out forwards; opacity: 0; }
        @keyframes reveal { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        .custom-checkbox:checked { background-color: #D4AF37; border-color: #D4AF37; }
        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }

        .no-save {
            -webkit-user-drag: none;
            -webkit-touch-callout: none;
            user-select: none;
            pointer-events: none; 
        }

        nav button { touch-action: manipulation; } /* Anti-zoom 10 tap */
    </style>
</head>
<body class="relative min-h-[100dvh] overflow-x-hidden flex flex-col font-sans">

    <div id="privacy-screen" class="fixed inset-0 z-[100] bg-wedding-light flex flex-col items-center justify-center p-8">
        <div class="max-w-sm w-full text-center">
            <h1 class="font-serif text-4xl text-wedding-dark mb-2">Michela <span class="text-wedding-gold italic">&</span> Maurizio</h1>
            <p class="text-xs uppercase tracking-widest text-gray-400 mb-10">09 Maggio 2026</p>
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-8 text-left">
                <h3 class="font-serif text-lg mb-4 text-center">Regole dell'Evento 📜</h3>
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" id="privacy-check" onchange="toggleEnterBtn()" class="custom-checkbox mt-1 w-5 h-5 rounded border-gray-300 text-wedding-gold focus:ring-wedding-gold transition-colors">
                    <span class="text-xs text-gray-600 leading-relaxed font-medium">Giuro solennemente di caricare solo prove compromettenti, sorrisi giganti e di far divertire gli sposi! (Accetto condizioni privacy)</span>
                </label>
            </div>
            
            <button id="btn-enter" disabled onclick="enterApp()" class="w-full bg-wedding-dark text-white font-medium uppercase tracking-widest text-xs py-4 rounded-xl opacity-50 cursor-not-allowed transition-all">
                Entra nella Gallery
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden flex-col items-center w-full flex-grow pb-24 relative">
        
        <div class="sticky top-0 z-40 w-full bg-[#FAFAFA]/90 backdrop-blur-md pt-8 pb-5 border-b border-gray-100 mb-4 px-4 shadow-sm">
            <header class="text-center max-w-2xl mx-auto">
                <h2 class="font-serif text-3xl text-wedding-dark mb-4">Live Gallery</h2>
                
                <button onclick="triggerUpload()" class="bg-wedding-dark text-white rounded-full px-6 py-3 font-medium uppercase tracking-widest text-[11px] shadow-lg flex items-center justify-center gap-3 mx-auto active:scale-95 transition-all w-full max-w-xs border border-gray-800">
                    <div class="relative shrink-0">
                        <i data-lucide="camera" class="w-5 h-5"></i>
                        <div class="absolute -bottom-1 -right-2 bg-wedding-gold text-white rounded-full w-3.5 h-3.5 flex items-center justify-center text-[10px] font-bold">+</div>
                    </div>
                    Carica qui le tue foto
                </button>
            </header>
        </div>

        <div id="gallery-grid" class="grid grid-cols-3 gap-1 w-full max-w-2xl mx-auto px-1">
            <p id="empty-state" class="col-span-3 text-center text-gray-400 italic font-serif py-10">Inizia a riempire questo spazio di ricordi.</p>
        </div>
    </div>

    <input type="file" id="file-input" accept="image/*" multiple hidden onchange="handleFileSelection(event)">

    <div id="lightbox-modal" class="fixed inset-0 z-[110] bg-black/95 hidden flex-col items-center justify-center touch-none">
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white/50 hover:text-white p-2 z-50 transition-colors">
            <i data-lucide="x" class="w-8 h-8"></i>
        </button>
        
        <button onclick="prevLightbox(event)" class="absolute left-2 top-1/2 -translate-y-1/2 text-white/50 hover:text-white p-4 z-50 transition-colors">
            <i data-lucide="chevron-left" class="w-10 h-10 drop-shadow-lg"></i>
        </button>
        <button onclick="nextLightbox(event)" class="absolute right-2 top-1/2 -translate-y-1/2 text-white/50 hover:text-white p-4 z-50 transition-colors">
            <i data-lucide="chevron-right" class="w-10 h-10 drop-shadow-lg"></i>
        </button>

        <img id="lightbox-img" src="" class="max-w-full max-h-[85vh] object-contain transition-transform duration-300 no-save" draggable="false">
        
        <div id="lightbox-comment-container" class="absolute bottom-10 inset-x-0 flex justify-center hidden">
            <p id="lightbox-comment" class="text-white/90 text-sm italic text-center px-6 py-2 bg-black/50 rounded-full backdrop-blur-sm max-w-sm"></p>
        </div>
    </div>

    <div id="preview-modal" class="slide-up-modal fixed inset-0 z-[80] bg-white flex flex-col pt-12 pb-24 px-4">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-serif text-2xl text-wedding-dark">Condividi</h3>
            <button onclick="closePreview()" class="text-gray-400 p-2"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        
        <div id="preview-grid" class="overflow-y-auto grid grid-cols-2 gap-3 mb-4"></div>
        
        <div class="mb-4">
            <input type="text" id="photo-comment" placeholder="Aggiungi una dedica (opzionale)..." class="w-full bg-gray-50 border border-gray-200 text-sm p-4 rounded-xl focus:outline-none focus:border-wedding-gold transition-colors">
        </div>

        <div class="mt-auto">
            <button onclick="startUpload()" id="upload-btn" class="w-full bg-wedding-dark text-white font-medium uppercase tracking-widest text-xs py-4 rounded-xl flex justify-center items-center gap-2">
                <i data-lucide="send" class="w-4 h-4"></i> Invia alla Gallery
            </button>
        </div>
    </div>

    <div id="audio-modal" class="slide-up-modal fixed inset-0 z-[80] bg-wedding-accent flex flex-col pt-10 px-6 overflow-y-auto pb-24">
        <button onclick="closeAudio()" class="absolute top-6 right-4 text-gray-400 p-2"><i data-lucide="x" class="w-6 h-6"></i></button>
        
        <div class="text-center mb-8 shrink-0">
            <h3 class="font-serif text-3xl text-wedding-dark mb-2">Audio Guestbook</h3>
            <p class="text-sm text-gray-500">Lascia un messaggio vocale agli sposi.<br>Hai 90 secondi.</p>
            
            <div class="relative flex justify-center items-center w-24 h-24 mx-auto mt-6 mb-4">
                <button id="mic-btn" onclick="toggleRecording()" class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg border-2 border-wedding-gold text-wedding-gold transition-all">
                    <i data-lucide="mic" class="w-8 h-8" id="mic-icon"></i>
                </button>
            </div>
            
            <p id="audio-timer" class="font-mono text-lg text-wedding-dark font-medium mb-4">00:00</p>
            
            <div id="audio-comment-container" class="mb-4 w-full max-w-xs mx-auto hidden">
                <input type="text" id="audio-comment" placeholder="Il tuo nome o una dedica (opzionale)..." class="w-full bg-white border border-gray-200 text-sm p-3 rounded-xl focus:outline-none focus:border-wedding-gold transition-colors text-center">
            </div>
            
            <button id="send-audio-btn" onclick="processAndUploadAudio()" disabled class="w-full max-w-xs mx-auto bg-wedding-dark text-white font-medium uppercase tracking-widest text-xs py-3 rounded-xl opacity-50 transition-all hidden">
                Invia Messaggio
            </button>
        </div>

        <div class="w-full h-px bg-gray-200 my-6 shrink-0"></div>

        <div class="flex-grow flex flex-col">
            <h4 class="font-serif text-lg text-wedding-dark mb-4 text-center">Messaggi Ricevuti</h4>
            <div id="audio-feed-grid" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <div id="pin-modal" class="fixed inset-0 z-[120] bg-wedding-dark/95 backdrop-blur-md hidden flex-col items-center justify-center px-8">
        <button onclick="closePinModal()" class="absolute top-8 right-6 text-white/50 p-2"><i data-lucide="x" class="w-6 h-6"></i></button>
        <i data-lucide="lock" class="w-8 h-8 text-wedding-gold mb-4"></i>
        <h3 class="font-sans tracking-widest uppercase text-white text-sm mb-8">Accesso Riservato</h3>
        
        <div class="flex gap-4 mb-10">
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
        </div>

        <div class="grid grid-cols-3 gap-6 w-full max-w-xs">
            <button onclick="enterPin('1')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10">1</button>
            <button onclick="enterPin('2')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10">2</button>
            <button onclick="enterPin('3')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10">3</button>
            <button onclick="enterPin('4')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10">4</button>
            <button onclick="enterPin('5')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10">5</button>
            <button onclick="enterPin('6')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10">6</button>
            <button onclick="enterPin('7')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10">7</button>
            <button onclick="enterPin('8')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10">8</button>
            <button onclick="enterPin('9')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10">9</button>
            <div></div>
            <button onclick="enterPin('0')" class="w-16 h-16 mx-auto rounded-full border border-white/20 text-white text-2xl font-light active:bg-white/10">0</button>
            <button onclick="clearPin()" class="w-16 h-16 mx-auto text-white/50 text-xs uppercase tracking-widest active:text-white">Canc</button>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around items-center px-2 py-2 z-[60] pb-safe">
        <button onclick="closeModals()" class="text-wedding-dark flex flex-col items-center w-16 opacity-70 hover:opacity-100">
            <i data-lucide="layout-grid" class="w-5 h-5 mb-1"></i>
            <span class="text-[9px] uppercase tracking-wider font-semibold">Foto</span>
        </button>

        <button onclick="triggerUpload()" class="bg-wedding-dark text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg shadow-gray-300 -mt-5 border-4 border-[#FAFAFA] active:scale-95 transition-transform relative">
            <i data-lucide="camera" class="w-6 h-6"></i>
            <div class="absolute bottom-0 right-0 bg-wedding-gold text-white rounded-full w-4 h-4 flex items-center justify-center text-xs font-bold border-2 border-wedding-dark">+</div>
        </button>

        <button onclick="openAudio()" class="text-wedding-dark flex flex-col items-center w-16 opacity-70 hover:opacity-100">
            <i data-lucide="mic" class="w-5 h-5 mb-1"></i>
            <span class="text-[9px] uppercase tracking-wider font-semibold">Audio</span>
        </button>

        <button onclick="handleSecretAdmin()" class="text-wedding-dark flex flex-col items-center w-16 opacity-30 hover:opacity-100">
            <i data-lucide="lock" class="w-5 h-5 mb-1" id="lock-icon"></i>
            <span class="text-[9px] uppercase tracking-wider font-semibold">Sposi</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAKSDOdxKmz_NmqhuijaNGZXdjLBXnHCU1E",
          authDomain: "fir-config-6e53e.firebaseapp.com",
          projectId: "fir-config-6e53e",
          storageBucket: "fir-config-6e53e.firebasestorage.app",
          messagingSenderId: "790952608645",
          appId: "1:790952608645:web:a2f443e7be975ff0dc7aec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const galleryRef = collection(db, "live_gallery");

        const CLOUD_NAME = "dvjgznbzm";
        const UPLOAD_PRESET = "wedding_live_feed";

        let selectedFilesArray = [];
        let globalGalleryData = []; // Salva i dati delle foto per la Lightbox
        let currentLightboxIndex = 0;

        lucide.createIcons();

        // --- SCHERMATA PRIVACY ---
        window.toggleEnterBtn = () => {
            const btn = document.getElementById('btn-enter');
            btn.disabled = !document.getElementById('privacy-check').checked;
            btn.classList.toggle('opacity-50', btn.disabled);
            btn.classList.toggle('cursor-not-allowed', btn.disabled);
        };

        window.enterApp = () => {
            document.getElementById('privacy-screen').classList.add('fade-out-up');
            setTimeout(() => {
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
            }, 600);
        };

        // --- UPLOAD FOTO E ANTEPRIMA ---
        window.triggerUpload = () => { document.getElementById('file-input').click(); };
        
        window.handleFileSelection = (event) => {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;
            selectedFilesArray = files.map(f => ({ file: f, flipped: false }));
            renderPreviewGrid();
            document.getElementById('preview-modal').classList.add('open');
            document.getElementById('photo-comment').value = ''; 
            event.target.value = '';
        };

        window.renderPreviewGrid = () => {
            const grid = document.getElementById('preview-grid');
            grid.innerHTML = '';
            selectedFilesArray.forEach((item, index) => {
                const url = URL.createObjectURL(item.file);
                const flipClass = item.flipped ? '-scale-x-100' : '';
                grid.insertAdjacentHTML('beforeend', `
                    <div class="flex flex-col gap-1 bg-white rounded-lg">
                        <div class="relative aspect-square rounded-lg overflow-hidden bg-gray-100">
                            <img src="${url}" class="w-full h-full object-cover ${flipClass}">
                            <button onclick="removeFile(${index})" class="absolute top-1 right-1 bg-white/80 p-1.5 rounded-full text-red-500 shadow-sm"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                        </div>
                        <button onclick="toggleFlip(${index})" class="py-1 text-gray-500 text-[10px] uppercase font-bold flex items-center justify-center gap-1 border border-gray-200 rounded-md mt-1">
                            <i data-lucide="flip-horizontal" class="w-3 h-3"></i> Specchia
                        </button>
                    </div>
                `);
            });
            lucide.createIcons();
        };

        window.toggleFlip = (index) => { selectedFilesArray[index].flipped = !selectedFilesArray[index].flipped; renderPreviewGrid(); };
        window.removeFile = (index) => { selectedFilesArray.splice(index, 1); if (selectedFilesArray.length === 0) closePreview(); else renderPreviewGrid(); };
        
        window.closePreview = () => { document.getElementById('preview-modal').classList.remove('open'); selectedFilesArray = []; };
        window.closeModals = () => { closePreview(); closeAudio(); closePinModal(); };

        const getFlippedFile = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width; canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob((blob) => resolve(new File([blob], file.name, { type: file.type })), file.type);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        window.startUpload = async () => {
            if (selectedFilesArray.length === 0) return;
            const btn = document.getElementById('upload-btn');
            const comment = document.getElementById('photo-comment').value.trim();
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Invio...';
            btn.disabled = true;

            for (let item of selectedFilesArray) {
                try {
                    let fileToUpload = item.flipped ? await getFlippedFile(item.file) : item.file;
                    const formData = new FormData();
                    formData.append("file", fileToUpload);
                    formData.append("upload_preset", UPLOAD_PRESET);

                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
                    const data = await res.json();

                    await addDoc(galleryRef, { 
                        url: data.secure_url, 
                        type: 'image',
                        comment: comment, 
                        timestamp: serverTimestamp() 
                    });
                } catch (err) { console.error(err); }
            }

            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#1A1A1A', '#D4AF37', '#FAFAFA'] });
            btn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> Invia alla Gallery';
            btn.disabled = false;
            closePreview();
        };

        // --- AUDIO LOGIC ---
        let mediaRecorder; let audioChunks = []; let recordingInterval; let seconds = 0;
        
        window.openAudio = () => { document.getElementById('audio-modal').classList.add('open'); };
        window.closeAudio = () => { 
            document.getElementById('audio-modal').classList.remove('open');
            document.getElementById('audio-comment-container').classList.add('hidden');
            document.getElementById('audio-comment').value = '';
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('mic-btn');
            const icon = document.getElementById('mic-icon');
            const timerDisplay = document.getElementById('audio-timer');
            const sendBtn = document.getElementById('send-audio-btn');
            const commentBox = document.getElementById('audio-comment-container');

            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    sendBtn.classList.add('hidden');
                    commentBox.classList.add('hidden');

                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        sendBtn.classList.remove('hidden');
                        commentBox.classList.remove('hidden');
                        sendBtn.disabled = false;
                        sendBtn.innerHTML = 'Invia Messaggio';
                    };

                    mediaRecorder.start();
                    btn.classList.add('recording-pulse', 'border-red-500', 'text-red-500');
                    icon.setAttribute('data-lucide', 'square'); lucide.createIcons();
                    
                    seconds = 0;
                    recordingInterval = setInterval(() => {
                        seconds++;
                        let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                        let s = (seconds % 60).toString().padStart(2, '0');
                        timerDisplay.innerText = `${m}:${s}`;
                        if (seconds >= 90) toggleRecording(); 
                    }, 1000);

                } catch (err) { alert("Per favore, consenti l'accesso al microfono per registrare."); }
            } else {
                mediaRecorder.stop();
                clearInterval(recordingInterval);
                btn.classList.remove('recording-pulse', 'border-red-500', 'text-red-500');
                icon.setAttribute('data-lucide', 'mic'); lucide.createIcons();
                mediaRecorder.stream.getTracks().forEach(track => track.stop()); 
            }
        };

        window.processAndUploadAudio = async () => {
            const btn = document.getElementById('send-audio-btn');
            const commentBox = document.getElementById('audio-comment-container');
            const comment = document.getElementById('audio-comment').value.trim();

            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline-block"></i> Salvataggio...';
            btn.disabled = true;

            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append("file", audioBlob, "guestbook_audio.webm");
            formData.append("upload_preset", UPLOAD_PRESET);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, { method: "POST", body: formData });
                const data = await res.json();
                
                await addDoc(galleryRef, { url: data.secure_url, type: 'audio', comment: comment, timestamp: serverTimestamp() });

                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#D4AF37', '#1A1A1A'] });
                document.getElementById('audio-timer').innerText = "00:00";
                document.getElementById('audio-comment').value = '';
                commentBox.classList.add('hidden');
            } catch (err) { alert("Errore durante l'invio dell'audio."); } 
            finally { btn.classList.add('hidden'); }
        };

        // --- LOGICA LIGHTBOX (Visualizzazione a tutto schermo con Swipe) ---
        window.openLightbox = (index) => {
            currentLightboxIndex = index;
            updateLightboxUI();
            document.getElementById('lightbox-modal').classList.remove('hidden');
            document.getElementById('lightbox-modal').classList.add('flex');
            document.body.style.overflow = 'hidden'; // Blocca lo scorrimento del sito dietro
        };

        window.closeLightbox = () => {
            document.getElementById('lightbox-modal').classList.remove('flex');
            document.getElementById('lightbox-modal').classList.add('hidden');
            document.body.style.overflow = ''; 
        };

        window.updateLightboxUI = () => {
            if (globalGalleryData.length === 0) return;
            const item = globalGalleryData[currentLightboxIndex];
            
            // Richiama l'immagine in alta risoluzione
            const highResUrl = item.url.replace("/upload/", "/upload/w_1200,c_limit,q_auto/");
            document.getElementById('lightbox-img').src = highResUrl;
            
            // Gestione Commento
            const commentContainer = document.getElementById('lightbox-comment-container');
            const commentText = document.getElementById('lightbox-comment');
            if(item.comment) {
                commentText.innerText = `"${item.comment}"`;
                commentContainer.classList.remove('hidden');
            } else {
                commentContainer.classList.add('hidden');
            }
        };

        window.prevLightbox = (e) => {
            if(e) e.stopPropagation();
            currentLightboxIndex = (currentLightboxIndex - 1 + globalGalleryData.length) % globalGalleryData.length;
            updateLightboxUI();
        };

        window.nextLightbox = (e) => {
            if(e) e.stopPropagation();
            currentLightboxIndex = (currentLightboxIndex + 1) % globalGalleryData.length;
            updateLightboxUI();
        };

        // Motore di Swipe per Mobile
        let touchStartX = 0;
        let touchEndX = 0;
        const lightboxModal = document.getElementById('lightbox-modal');
        
        lightboxModal.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        lightboxModal.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            const swipeThreshold = 50; 
            if (touchEndX < touchStartX - swipeThreshold) window.nextLightbox();
            if (touchEndX > touchStartX + swipeThreshold) window.prevLightbox();
        }, {passive: true});


        // --- RENDER SEPARATO (FOTO MAIN / AUDIO MODAL) E COSTRUZIONE ARRAY LIGHTBOX ---
        const q = query(galleryRef, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const gallery = document.getElementById("gallery-grid");
            const audioFeed = document.getElementById("audio-feed-grid");
            
            gallery.innerHTML = "";
            audioFeed.innerHTML = "";
            
            globalGalleryData = []; // Azzera l'array delle foto per la Lightbox
            let photoIndexCounter = 0; // Contatore per gli indici delle foto

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                if (data.type === 'audio') {
                    // RENDER AUDIO
                    const dateStr = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Ora';
                    const audioCommentHtml = data.comment ? `<p class="text-[10px] text-gray-500 italic mb-2">"${data.comment}"</p>` : '';
                    
                    const audioHTML = `
                        <div class="photo-reveal bg-white border border-gray-100 rounded-xl p-4 shadow-sm flex items-center gap-4">
                            <div class="bg-wedding-accent rounded-full p-3 text-wedding-gold shrink-0"><i data-lucide="mic" class="w-5 h-5"></i></div>
                            <div class="flex-grow min-w-0">
                                <p class="text-xs font-semibold text-wedding-dark mb-1">Messaggio Vocale</p>
                                ${audioCommentHtml}
                                <audio controls controlsList="nodownload" src="${data.url}" class="w-full h-8 scale-[0.85] origin-left"></audio>
                            </div>
                            <span class="text-[10px] text-gray-400 self-start mt-1 shrink-0">${dateStr}</span>
                        </div>
                    `;
                    audioFeed.insertAdjacentHTML('beforeend', audioHTML);
                } else {
                    // RENDER FOTO
                    // Salviamo l'url e il commento nell'array globale che serve allo Swipe
                    globalGalleryData.push({ url: data.url, comment: data.comment });
                    
                    const currentIndex = photoIndexCounter; // Salva l'indice attuale per l'onclick
                    photoIndexCounter++;

                    const optimizedUrl = data.url.replace("/upload/", "/upload/w_400,h_400,c_fill,g_auto,q_auto,f_auto/");
                    const commentHtml = data.comment ? `<div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/70 to-transparent p-2 text-white text-[9px] truncate">${data.comment}</div>` : '';

                    // Ho aggiunto l'onclick per aprire la lightbox all'indice corretto
                    const imgHTML = `
                        <div class="photo-reveal aspect-square relative overflow-hidden bg-gray-100 rounded-sm cursor-pointer" onclick="openLightbox(${currentIndex})" oncontextmenu="return false;">
                            <img src="${optimizedUrl}" class="w-full h-full object-cover no-save" draggable="false">
                            <div class="absolute inset-0 z-10 no-save"></div>
                            ${commentHtml}
                        </div>
                    `;
                    gallery.insertAdjacentHTML('beforeend', imgHTML);
                }
            });

            if (photoIndexCounter === 0) {
                gallery.innerHTML = '<p id="empty-state" class="col-span-3 text-center text-gray-400 italic font-serif py-10">Inizia a riempire questo spazio di ricordi.</p>';
            }
            lucide.createIcons();
        });

        // --- LOGICA PIN PAD ADMIN ---
        let adminTapCount = 0;
        let adminTapTimer = null;
        let enteredPin = "";
        const PIN_CODE = "2026";

        window.handleSecretAdmin = () => {
            adminTapCount++;
            const lockIcon = document.getElementById('lock-icon');
            lockIcon.classList.add('scale-125', 'text-wedding-gold');
            setTimeout(() => lockIcon.classList.remove('scale-125', 'text-wedding-gold'), 150);

            if (adminTapCount === 1) {
                adminTapTimer = setTimeout(() => { adminTapCount = 0; }, 4000); 
            }

            if (adminTapCount >= 10) {
                clearTimeout(adminTapTimer);
                adminTapCount = 0; 
                document.getElementById('pin-modal').classList.remove('hidden');
                document.getElementById('pin-modal').classList.add('flex');
                updatePinDots();
            }
        };

        window.closePinModal = () => {
            document.getElementById('pin-modal').classList.remove('flex');
            document.getElementById('pin-modal').classList.add('hidden');
            clearPin();
        };

        window.enterPin = (num) => {
            if (enteredPin.length < 4) {
                enteredPin += num;
                updatePinDots();
                if (enteredPin.length === 4) setTimeout(() => checkPin(), 200);
            }
        };

        window.clearPin = () => { enteredPin = ""; updatePinDots(); };

        window.updatePinDots = () => {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, index) => {
                if (index < enteredPin.length) dot.classList.add('bg-wedding-gold');
                else dot.classList.remove('bg-wedding-gold');
            });
        };

        window.checkPin = () => {
            if (enteredPin === PIN_CODE) {
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.8 }, colors: ['#D4AF37', '#FAFAFA'] });
                setTimeout(() => { window.location.href = "admin.html"; }, 800);
            } else {
                const dotContainer = document.querySelector('.pin-dot').parentElement;
                dotContainer.classList.add('translate-x-2');
                setTimeout(() => dotContainer.classList.remove('translate-x-2'), 100);
                setTimeout(() => dotContainer.classList.add('-translate-x-2'), 200);
                setTimeout(() => dotContainer.classList.remove('-translate-x-2'), 300);
                setTimeout(() => clearPin(), 400);
            }
        };
    </script>
</body>
</html>
