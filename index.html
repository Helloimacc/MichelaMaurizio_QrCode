<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Michela & Maurizio | L'Evento</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: { 900: '#064E3B', 950: '#022C22' },
                        gold: { 400: '#FBBF24', 500: '#D4AF37', 600: '#B45309' }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        cursive: ['Great Vibes', 'cursive']
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #022C22; color: #FDFBF7; -webkit-tap-highlight-color: transparent; }
        
        /* Animazione Sipario */
        .curtain-open {
            animation: slideUpCurtain 1.5s cubic-bezier(0.8, 0, 0.2, 1) forwards;
        }
        @keyframes slideUpCurtain {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100%); opacity: 0; pointer-events: none; display: none; }
        }

        /* Archi Architettonici (Statement Shapes) */
        .arched-photo {
            border-radius: 50vw 50vw 0 0; /* Crea l'arco perfetto in cima */
            border: 2px solid #D4AF37; /* Bordo oro */
            padding: 4px;
            background: rgba(212, 175, 55, 0.1);
        }

        /* Animazione Ingresso Foto */
        .photo-reveal { animation: revealUp 0.8s ease-out forwards; opacity: 0; }
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Pulsante Sigillo 3D (Trompe-l'œil) */
        .seal-button {
            box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.3);
            background: linear-gradient(135deg, #D4AF37, #B45309);
        }
    </style>
</head>
<body class="relative min-h-[100dvh] overflow-x-hidden">

    <div id="welcome-curtain" class="fixed inset-0 z-[100] bg-emerald-950 flex flex-col items-center justify-center p-6 border-8 border-gold-500/20">
        <p class="text-gold-400 font-sans tracking-[0.3em] text-xs uppercase mb-4">Benvenuti all'evento di</p>
        <h1 class="font-cursive text-6xl md:text-7xl text-gold-500 mb-8 text-center drop-shadow-lg">Michela & Maurizio</h1>
        
        <button onclick="openCurtain()" class="seal-button text-emerald-950 font-serif font-bold italic px-10 py-4 rounded-full transition-transform active:scale-95 flex items-center gap-2">
            Entra nel Ricevimento ✦
        </button>
    </div>

    <div id="main-app" class="hidden flex-col items-center w-full min-h-screen px-4 pb-24 pt-8">
        
        <header class="text-center mb-10">
            <h2 class="font-cursive text-5xl text-gold-500 mb-2">Live Gallery</h2>
            <p class="text-stone-400 font-sans text-[10px] uppercase tracking-[0.2em]">Cattura la magia. Adesso.</p>
        </header>

        <div id="gallery-grid" class="grid grid-cols-2 gap-x-4 gap-y-8 w-full max-w-md">
            <p id="empty-state" class="col-span-2 text-center text-stone-500 italic font-serif py-10">
                L'album è vuoto. Sii il primo a scattare!
            </p>
        </div>

        <div class="fixed bottom-8 inset-x-0 flex justify-center z-50 pointer-events-none">
            <button onclick="document.getElementById('instant-upload').click()" 
                    class="pointer-events-auto seal-button text-white w-20 h-20 rounded-full flex flex-col items-center justify-center active:scale-90 transition-transform">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
            </button>
            <input type="file" id="instant-upload" accept="image/*" capture="environment" hidden onchange="handleUpload(event)">
        </div>

        <div id="status-msg" class="fixed top-4 bg-gold-500 text-emerald-950 font-bold px-6 py-2 rounded-full shadow-lg hidden z-50 animate-pulse">
            Sviluppo rullino in corso...
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // CONFIGURAZIONE FIREBASE
        const firebaseConfig = {
          apiKey: "AIzaSyAKSDOdxKmz_NmqhuijaNGZXdjLBXnHCU1E",
          authDomain: "fir-config-6e53e.firebaseapp.com",
          projectId: "fir-config-6e53e",
          storageBucket: "fir-config-6e53e.firebasestorage.app",
          messagingSenderId: "790952608645",
          appId: "1:790952608645:web:a2f443e7be975ff0dc7aec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const galleryRef = collection(db, "live_gallery");

        // CONFIGURAZIONE CLOUDINARY
        const CLOUD_NAME = "dvjgznbzm";
        const UPLOAD_PRESET = "wedding_live_feed";

        // LOGICA UI: Apertura Sipario
        window.openCurtain = () => {
            document.getElementById('welcome-curtain').classList.add('curtain-open');
            setTimeout(() => {
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
            }, 500);
        };

        // Effetto WOW: Coriandoli
        const fireConfetti = () => {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#D4AF37', '#FBBF24', '#FFFFFF'] });
        };

        // LOGICA DI UPLOAD
        window.handleUpload = async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const status = document.getElementById('status-msg');
            status.classList.remove('hidden');

            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
                const data = await res.json();

                await addDoc(galleryRef, { url: data.secure_url, timestamp: serverTimestamp() });

                status.classList.add('hidden');
                event.target.value = ""; 
                fireConfetti(); // Boom! Festeggiamo lo scatto
            } catch (err) {
                console.error(err);
                alert("Errore di rete. Riprova!");
                status.classList.add('hidden');
            }
        };

        // RENDER LIVE DELLA GALLERIA (con Statement Shapes)
        const q = query(galleryRef, orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const gallery = document.getElementById("gallery-grid");
            const emptyState = document.getElementById("empty-state");
            
            if (!snapshot.empty && emptyState) emptyState.remove();
            
            gallery.innerHTML = "";
            snapshot.forEach((doc, index) => {
                const data = doc.data();
                const optimizedUrl = data.url.replace("/upload/", "/upload/w_500,h_700,c_fill,g_auto,q_auto,f_auto/");
                
                const imgHTML = `
                    <div class="photo-reveal arched-photo h-48 md:h-64 shadow-2xl relative overflow-hidden group" style="animation-delay: ${index * 0.1}s">
                        <img src="${optimizedUrl}" class="w-full h-full object-cover rounded-[inherit]">
                        <div class="absolute inset-0 bg-emerald-900/20 mix-blend-multiply"></div>
                    </div>
                `;
                gallery.insertAdjacentHTML('beforeend', imgHTML);
            });
        });
    </script>
</body>
</html>
