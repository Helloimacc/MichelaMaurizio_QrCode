<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Michela & Maurizio | Wedding App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        wedding: { 
                            bg: '#FDFBF7', 
                            card: '#FFFFFF',
                            brown: '#B89470', 
                            sage: '#5D6D5E',  
                            gold: '#D4AF37', 
                            dark: '#2D2926' 
                        } 
                    },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], serif: ['Playfair Display', 'serif'] }
                }
            }
        }
    </script>

    <style>
        body { background-color: #FDFBF7; color: #2D2926; -webkit-tap-highlight-color: transparent; }
        .slide-up-modal { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-up-modal.open { transform: translateY(0); }
        .no-save { -webkit-user-drag: none; -webkit-touch-callout: none; user-select: none; pointer-events: none; }
        .touch-manipulation { touch-action: manipulation; }
        .btn-shadow { box-shadow: 0 4px 14px 0 rgba(184, 148, 112, 0.39); }
        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); } 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); } }
    </style>
</head>
<body class="relative min-h-[100dvh] overflow-x-hidden flex flex-col font-sans">

    <div id="privacy-screen" class="fixed inset-0 z-[100] bg-wedding-bg flex flex-col items-center justify-center p-8 text-center">
        <div class="max-w-sm w-full">
            <div class="w-20 h-20 bg-wedding-gold/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-wedding-gold/30 text-wedding-gold font-serif text-2xl">M&M</div>
            <h1 class="font-serif text-3xl mb-2">Benvenuti al Matrimonio</h1>
            <p class="text-xs uppercase tracking-widest text-wedding-brown mb-10">09 Maggio 2026</p>
            
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-orange-50 mb-8 text-left">
                <input type="text" id="guest-name" placeholder="Inserisci il tuo nome" class="w-full bg-wedding-bg border border-gray-100 text-base font-bold p-4 rounded-2xl mb-4 focus:outline-none focus:border-wedding-brown transition-colors text-center">
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" id="privacy-check" onchange="toggleEnterBtn()" class="mt-1 w-5 h-5 rounded border-gray-300 text-wedding-brown focus:ring-wedding-brown">
                    <span class="text-[11px] text-gray-500 leading-tight font-medium">Accetto di condividere i miei momenti con gli sposi e gli invitati. (Privacy Policy)</span>
                </label>
            </div>
            <button id="btn-enter" disabled onclick="enterApp()" class="w-full bg-wedding-sage text-white font-bold uppercase tracking-widest text-xs py-5 rounded-2xl opacity-50 cursor-not-allowed transition-all shadow-lg">Entra nell'App</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex-col items-center w-full flex-grow pb-24 relative">
        
        <div class="sticky top-0 z-40 w-full bg-wedding-bg/95 backdrop-blur-md pt-4 pb-4 px-4 border-b border-orange-50">
            <div class="flex justify-between items-center mb-4 px-2">
                <button onclick="openSettings()" class="text-wedding-dark/40 hover:text-wedding-brown transition-colors">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
                <button onclick="handleSecretAdmin(event)" class="text-wedding-dark/40 hover:text-wedding-brown transition-colors touch-manipulation">
                    <i data-lucide="user" class="w-6 h-6 transition-transform" id="lock-icon"></i>
                </button>
            </div>

            <div class="max-w-md mx-auto bg-gradient-to-r from-[#EFE5D8] to-[#F5F0E8] rounded-[40px] p-6 flex items-center gap-6 shadow-sm relative overflow-hidden">
                <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-wedding-gold font-serif text-lg border border-wedding-gold/20 shrink-0 shadow-inner">M&M</div>
                <div class="flex-grow">
                    <p class="text-[10px] uppercase tracking-widest font-bold text-wedding-brown mb-1">Wedding Hub</p>
                    <h2 class="font-serif text-xl text-wedding-dark leading-tight">Michela & Maurizio</h2>
                    <p class="text-[10px] text-gray-500 font-medium">09 Maggio 2026</p>
                </div>
                <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-md shrink-0">
                    <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=2069&auto=format&fit=crop" class="w-full h-full object-cover">
                </div>
            </div>

            <div class="mt-6 flex flex-col items-center">
                <button onclick="triggerUpload()" class="bg-wedding-brown text-white rounded-full px-8 py-4 font-bold uppercase tracking-widest text-[10px] btn-shadow flex items-center gap-2 active:scale-95 transition-all w-full max-w-xs justify-center">
                    <i data-lucide="camera" class="w-4 h-4"></i> Carica i tuoi momenti
                </button>
            </div>
        </div>

        <div id="gallery-grid" class="grid grid-cols-2 gap-4 w-full max-w-2xl mx-auto px-4 mt-8"></div>
    </div>

    <div id="audio-modal" class="slide-up-modal fixed inset-0 z-[80] bg-wedding-bg flex flex-col pt-10 px-6 overflow-y-auto pb-24">
        <div class="flex justify-between items-center mb-8">
            <button onclick="forceVisualRefresh(event)" class="text-gray-400 p-2"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            <h3 class="font-serif text-2xl">Audio Guestbook</h3>
            <button onclick="closeAudio()" class="text-gray-400 p-2"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        
        <div class="text-center mb-10">
            <div class="w-28 h-28 mx-auto mb-6">
                <button id="mic-btn" onclick="toggleRecording()" class="w-full h-full bg-white rounded-full flex items-center justify-center shadow-xl border-2 border-wedding-gold text-wedding-gold transition-all">
                    <i data-lucide="mic" class="w-10 h-10" id="mic-icon"></i>
                </button>
            </div>
            <p id="audio-timer" class="font-mono text-2xl mb-6 text-wedding-dark">00:00</p>
            
            <div id="audio-comment-container" class="mb-6 hidden">
                <input type="text" id="audio-comment" placeholder="Lascia una dedica..." class="w-full bg-white border border-gray-100 p-5 rounded-3xl text-center font-bold focus:outline-none focus:border-wedding-gold">
            </div>
            
            <button id="send-audio-btn" onclick="processAndUploadAudio()" disabled class="w-full bg-wedding-sage text-white font-bold py-5 rounded-3xl hidden uppercase tracking-widest text-xs shadow-lg">Invia Messaggio</button>
        </div>

        <div class="h-px bg-gray-100 mb-10"></div>
        <div id="audio-feed-grid" class="flex flex-col gap-5"></div>
    </div>

    <div id="pin-modal" class="fixed inset-0 z-[120] bg-wedding-dark/95 backdrop-blur-md hidden flex-col items-center justify-center">
        <button onclick="closePinModal()" class="absolute top-8 right-6 text-white/50 p-2"><i data-lucide="x" class="w-6 h-6"></i></button>
        <i data-lucide="lock" class="w-8 h-8 text-wedding-gold mb-4"></i>
        <h3 class="font-serif text-white text-xl mb-10 text-center">Area Riservata<br><span class="text-[10px] text-wedding-gold uppercase tracking-widest font-sans font-bold">Accesso Sposi</span></h3>
        <div class="flex gap-4 mb-10">
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
            <div class="w-4 h-4 rounded-full border border-wedding-gold pin-dot transition-colors"></div>
        </div>
        <div class="grid grid-cols-3 gap-6 w-full max-w-xs px-8">
            <button onclick="enterPin('1')" class="w-16 h-16 rounded-full border border-white/10 text-white text-2xl font-light active:bg-white/20 touch-manipulation">1</button>
            <button onclick="enterPin('2')" class="w-16 h-16 rounded-full border border-white/10 text-white text-2xl font-light active:bg-white/20 touch-manipulation">2</button>
            <button onclick="enterPin('3')" class="w-16 h-16 rounded-full border border-white/10 text-white text-2xl font-light active:bg-white/20 touch-manipulation">3</button>
            <button onclick="enterPin('4')" class="w-16 h-16 rounded-full border border-white/10 text-white text-2xl font-light active:bg-white/20 touch-manipulation">4</button>
            <button onclick="enterPin('5')" class="w-16 h-16 rounded-full border border-white/10 text-white text-2xl font-light active:bg-white/20 touch-manipulation">5</button>
            <button onclick="enterPin('6')" class="w-16 h-16 rounded-full border border-white/10 text-white text-2xl font-light active:bg-white/20 touch-manipulation">6</button>
            <button onclick="enterPin('7')" class="w-16 h-16 rounded-full border border-white/10 text-white text-2xl font-light active:bg-white/20 touch-manipulation">7</button>
            <button onclick="enterPin('8')" class="w-16 h-16 rounded-full border border-white/10 text-white text-2xl font-light active:bg-white/20 touch-manipulation">8</button>
            <button onclick="enterPin('9')" class="w-16 h-16 rounded-full border border-white/10 text-white text-2xl font-light active:bg-white/20 touch-manipulation">9</button>
            <div class="w-16 h-16"></div>
            <button onclick="enterPin('0')" class="w-16 h-16 rounded-full border border-white/10 text-white text-2xl font-light active:bg-white/20 touch-manipulation">0</button>
            <button onclick="clearPin()" class="text-white/50 text-[10px] uppercase font-bold touch-manipulation">Canc</button>
        </div>
    </div>

    <nav class="fixed bottom-0 inset-x-0 bg-white border-t border-gray-100 flex justify-center items-center h-[80px] z-[60] pb-safe gap-16">
        <button onclick="closeModals()" class="text-wedding-dark flex flex-col items-center w-16 opacity-40 hover:opacity-100 touch-manipulation">
            <i data-lucide="layout-grid" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px] uppercase tracking-wider font-bold">Foto</span>
        </button>
        <button onclick="triggerUpload()" class="bg-wedding-dark text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl -mt-10 border-4 border-wedding-bg active:scale-95 transition-transform touch-manipulation">
            <i data-lucide="plus" class="w-7 h-7"></i>
        </button>
        <button onclick="openAudio()" class="text-wedding-dark flex flex-col items-center w-16 opacity-40 hover:opacity-100 touch-manipulation">
            <i data-lucide="mic" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px] uppercase tracking-wider font-bold">Audio</span>
        </button>
    </nav>

    <input type="file" id="file-input" accept="image/*" multiple hidden onchange="handleFileSelection(event)">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyAKSDOdxKmz_NmqhuijaNGZXdjLBXnHCU1E",
          authDomain: "fir-config-6e53e.firebaseapp.com",
          projectId: "fir-config-6e53e",
          storageBucket: "fir-config-6e53e.firebasestorage.app",
          messagingSenderId: "790952608645",
          appId: "1:790952608645:web:a2f443e7be975ff0dc7aec"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const galleryRef = collection(db, "live_gallery");
        const CLOUD_NAME = "dvjgznbzm";
        const UPLOAD_PRESET = "wedding_live_feed";

        let globalGuestName = ""; 
        let selectedFilesArray = [];
        let mediaRecorder; let audioChunks = []; let recordingInterval; let seconds = 0;
        let adminTapCount = 0; let adminTapTimer = null; let isSecretUnlocked = false; let enteredPin = ""; const PIN_CODE = "2026";

        lucide.createIcons();

        // --- SESSIONE ---
        window.onload = () => {
            const saved = sessionStorage.getItem('wedding_session_name');
            if(saved) {
                globalGuestName = saved;
                document.getElementById('privacy-screen').style.display = 'none';
                document.getElementById('main-app').classList.replace('hidden', 'flex');
            }
        };

        window.toggleEnterBtn = () => {
            const check = document.getElementById('privacy-check').checked;
            const btn = document.getElementById('btn-enter');
            btn.disabled = !check;
            btn.classList.toggle('opacity-50', !check);
            btn.classList.toggle('cursor-not-allowed', !check);
        };

        window.enterApp = () => {
            let name = document.getElementById('guest-name').value.trim();
            globalGuestName = name ? name : `Invitato #${Math.floor(1000 + Math.random() * 9000)}`;
            sessionStorage.setItem('wedding_session_name', globalGuestName);
            document.getElementById('privacy-screen').classList.add('fade-out-up');
            setTimeout(() => {
                document.getElementById('main-app').classList.replace('hidden', 'flex');
            }, 600);
        };

        // --- AUDIO GUESTBOOK FIX ---
        window.openAudio = () => { document.getElementById('audio-modal').classList.add('open'); };
        window.closeAudio = () => { 
            if(mediaRecorder && mediaRecorder.state === 'recording') toggleRecording();
            document.getElementById('audio-modal').classList.remove('open'); 
        };

        window.toggleRecording = async () => {
            const btn = document.getElementById('mic-btn');
            const icon = document.getElementById('mic-icon');
            const timerDisplay = document.getElementById('audio-timer');
            const sendBtn = document.getElementById('send-audio-btn');
            const commentBox = document.getElementById('audio-comment-container');

            if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        sendBtn.classList.replace('hidden', 'block');
                        commentBox.classList.replace('hidden', 'block');
                        sendBtn.disabled = false;
                        stream.getTracks().forEach(t => t.stop());
                    };

                    mediaRecorder.start();
                    btn.classList.add('recording-pulse', 'border-red-400');
                    icon.setAttribute('data-lucide', 'square'); lucide.createIcons();
                    
                    seconds = 0;
                    recordingInterval = setInterval(() => {
                        seconds++;
                        let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                        let s = (seconds % 60).toString().padStart(2, '0');
                        timerDisplay.innerText = `${m}:${s}`;
                        if (seconds >= 90) toggleRecording();
                    }, 1000);
                } catch (err) { alert("Attiva il microfono nelle impostazioni del browser."); }
            } else {
                mediaRecorder.stop();
                clearInterval(recordingInterval);
                btn.classList.remove('recording-pulse', 'border-red-400');
                icon.setAttribute('data-lucide', 'mic'); lucide.createIcons();
            }
        };

        window.processAndUploadAudio = async () => {
            const btn = document.getElementById('send-audio-btn');
            const comment = document.getElementById('audio-comment').value.trim();
            btn.innerHTML = "Invio in corso..."; btn.disabled = true;

            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append("file", blob, "audio.webm");
            formData.append("upload_preset", UPLOAD_PRESET);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, { method: "POST", body: formData });
                const data = await res.json();
                await addDoc(galleryRef, { url: data.secure_url, type: 'audio', comment: comment, guestName: globalGuestName, timestamp: serverTimestamp() });
                confetti({ particleCount: 100, colors: ['#B89470', '#D4AF37'] });
                closeAudio();
                document.getElementById('audio-timer').innerText = "00:00";
            } catch (err) { alert("Errore caricamento audio."); }
            finally { btn.innerHTML = "Invia Messaggio"; btn.classList.add('hidden'); }
        };

        // --- AREA RISERVATA 10 TAP FIX ---
        window.handleSecretAdmin = (e) => {
            if(e) e.preventDefault();
            adminTapCount++;
            
            const icon = document.getElementById('lock-icon');
            icon.classList.add('scale-150', 'text-wedding-brown');
            setTimeout(() => icon.classList.remove('scale-150', 'text-wedding-brown'), 150);
            
            clearTimeout(adminTapTimer);

            if (adminTapCount >= 10) {
                isSecretUnlocked = true; 
                adminTapCount = 0;
                confetti({ particleCount: 20, origin: { y: 0.1 }, colors: ['#D4AF37'] }); 
                openPinModal();
            } else {
                adminTapTimer = setTimeout(() => {
                    if (adminTapCount > 0) {
                        isSecretUnlocked = false; 
                        adminTapCount = 0; 
                        openPinModal(); 
                    }
                }, 800); 
            }
        };

        window.openPinModal = () => { 
            document.getElementById('pin-modal').classList.replace('hidden', 'flex'); 
            enteredPin = ""; updatePinDots();
        };
        window.closePinModal = () => { document.getElementById('pin-modal').classList.replace('flex', 'hidden'); };
        window.enterPin = (num) => {
            if (enteredPin.length < 4) {
                enteredPin += num; updatePinDots();
                if (enteredPin.length === 4) {
                    setTimeout(() => {
                        if (enteredPin === PIN_CODE && isSecretUnlocked) {
                            window.location.href = "admin.html";
                        } else {
                            const dots = document.querySelector('.pin-dot').parentElement;
                            dots.classList.add('animate-bounce');
                            setTimeout(() => { dots.classList.remove('animate-bounce'); enteredPin = ""; updatePinDots(); }, 500);
                        }
                    }, 300);
                }
            }
        };
        window.updatePinDots = () => {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => d.classList.toggle('bg-wedding-gold', i < enteredPin.length));
        };
        window.clearPin = () => { enteredPin = ""; updatePinDots(); };

        // --- UPLOAD FOTO ---
        window.triggerUpload = () => document.getElementById('file-input').click();
        window.handleFileSelection = (event) => {
            const files = Array.from(event.target.files);
            selectedFilesArray = files.map(f => ({ file: f, comment: '' }));
            document.getElementById('main-app').insertAdjacentHTML('afterend', '<div id="temp-load" class="fixed inset-0 z-[200] bg-black/20 flex items-center justify-center backdrop-blur-sm text-white font-bold">Preparazione...</div>');
            startUpload();
        };

        window.startUpload = async () => {
            for (let item of selectedFilesArray) {
                const formData = new FormData();
                formData.append("file", item.file);
                formData.append("upload_preset", UPLOAD_PRESET);
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: "POST", body: formData });
                const data = await res.json();
                await addDoc(galleryRef, { url: data.secure_url, type: 'image', guestName: globalGuestName, timestamp: serverTimestamp() });
            }
            const loader = document.getElementById('temp-load'); if(loader) loader.remove();
            confetti({ particleCount: 50, colors: ['#B89470'] });
        };

        // --- RENDER REALTIME ---
        onSnapshot(query(galleryRef, orderBy("timestamp", "desc")), (snap) => {
            const gallery = document.getElementById("gallery-grid");
            const audioFeed = document.getElementById("audio-feed-grid");
            gallery.innerHTML = ""; audioFeed.innerHTML = "";
            
            snap.forEach((doc) => {
                const data = doc.data();
                if (data.type === 'image') {
                    gallery.insertAdjacentHTML('beforeend', `
                        <div class="bg-white rounded-[32px] overflow-hidden shadow-sm border border-orange-50 p-2">
                            <img src="${data.url.replace('/upload/', '/upload/w_400,c_fill,q_auto/')}" class="aspect-square w-full object-cover rounded-[24px]">
                            <p class="text-[8px] text-gray-400 mt-2 px-2 font-bold uppercase truncate">${data.guestName}</p>
                        </div>
                    `);
                } else {
                    audioFeed.insertAdjacentHTML('beforeend', `
                        <div class="bg-white rounded-[32px] p-5 shadow-sm border border-orange-50">
                            <p class="text-xs font-bold mb-1 text-wedding-brown">${data.guestName}</p>
                            <p class="text-[10px] text-gray-400 italic mb-3">${data.comment || ''}</p>
                            <audio controls src="${data.url}" class="w-full h-8"></audio>
                        </div>
                    `);
                }
            });
            lucide.createIcons();
        });

        window.closeModals = () => { document.getElementById('audio-modal').classList.remove('open'); };
        window.forceVisualRefresh = () => window.location.reload();
        window.openSettings = () => { const n = prompt("Cambia il tuo nome:", globalGuestName); if(n) { globalGuestName = n; sessionStorage.setItem('wedding_session_name', n); } };
    </script>
</body>
</html>
